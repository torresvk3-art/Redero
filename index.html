<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Recall — Media Hub</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.88/epub.min.js"></script>
    <script src="https://unpkg.com/@mozilla/readability/Readability.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root { --bg: #F2F2F7; --surface: #FFFFFF; --text: #1C1C1E; --sub: #8E8E93; --accent: #007AFF; --border: #E5E5EA; }
        html.theme-black { --bg: #000000; --surface: #1C1C1E; --text: #FFFFFF; --sub: #8E8E93; --accent: #0A84FF; --border: #38383A; }
        html.theme-catppuccin { --bg: #1e1e2e; --surface: #313244; --text: #cdd6f4; --sub: #a6adc8; --accent: #89b4fa; --border: #45475a; }
        html.theme-gruvbox { --bg: #282828; --surface: #3c3836; --text: #ebdbb2; --sub: #928374; --accent: #fe8019; --border: #504945; }
        html.theme-solarized { --bg: #002b36; --surface: #073642; --text: #839496; --sub: #586e75; --accent: #268bd2; --border: #073642; }

        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; touch-action: pan-y; }
        
        .app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .main-scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 20px; }

        header { padding: 60px 25px 20px 25px; position: sticky; top: 0; z-index: 10; background: color-mix(in srgb, var(--bg) 80%, transparent); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        header h1 { font-size: 34px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .header-btns { display: flex; gap: 12px; }
        .icon-btn { background: none; border: none; color: var(--accent); cursor: pointer; padding: 0; display:flex; align-items:center; justify-content:center; }

        .content-padding { padding: 20px; }

        .glass-card { background: color-mix(in srgb, var(--surface) 60%, transparent); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid color-mix(in srgb, var(--text) 10%, transparent); border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.05); transition: transform 0.1s; position: relative; }
        .item-title { font-size: 19px; font-weight: 700; margin-bottom: 8px; display: block; line-height: 1.3; word-break: break-word; }
        .item-meta { font-size: 13px; color: var(--sub); display: block; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 6px;}
        .feed-img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 12px; margin-top: 12px; border: 1px solid var(--border); }
        .inbox-img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; float: right; margin-left: 10px; border: 1px solid var(--border); }

        nav { height: max(65px, env(safe-area-inset-bottom) + 50px); background: color-mix(in srgb, var(--surface) 85%, transparent); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-around; border-top: 1px solid var(--border); padding-top: 10px; padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0; }
        nav button { background: none; border: none; color: var(--sub); font-size: 11px; font-weight: 500; display:flex; flex-direction:column; align-items:center; gap:4px; height: 100%; cursor: pointer;}
        nav button.active { color: var(--accent); }

        .search-bar { background: var(--surface); border-radius: 12px; padding: 8px 15px; margin-bottom: 20px; display: flex; align-items: center; border: 1px solid var(--border); }
        .search-bar select, .dropdown-select { background: none; border: none; color: var(--accent); font-weight: 600; outline: none; font-size: 15px; margin-right: 10px; }
        input { background: none; border: none; color: var(--text); outline: none; font-size: 16px; width: 100%; padding: 10px 0; }
        .text-btn { background: none; border: none; color: var(--accent); font-size: 16px; font-weight: 600; cursor: pointer; padding:0;}
        .primary-btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; width: 100%; display: block; margin-bottom: 20px; text-align: center;}

        .view { display: none; } .view.active { display: block; }

        .fullscreen-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: none; flex-direction: column; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .fullscreen-modal.open { transform: translateY(0); }
        
        .modal-header { padding: max(20px, env(safe-area-inset-top)) 20px 15px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; position: relative; }
        .modal-drag-handle { width: 40px; height: 5px; background: var(--border); border-radius: 3px; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); }

        .modal-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px; padding-bottom: 60px; -webkit-user-select: text; user-select: text; -webkit-overflow-scrolling: touch; }
        
        .modal-content a, .glass-card a { color: var(--accent); text-decoration: underline; font-weight: 500; }
        
        .epub-container-wrapper { height: 65vh; min-height: 400px; width: 100%; border-radius: 12px; overflow: hidden; margin-top: 10px; position: relative;}
        #epub-viewer { width: 100%; height: 100%; background: var(--surface); margin: 0; overflow: hidden; border: none; transition: filter 0.2s ease; position: absolute; top:0; left:0;}
        
        #article-body, #transcript-container { font-size: 18px; line-height: 1.6; color: var(--text); padding: 0 10px; overflow-wrap: break-word;}
        #article-body img, #article-body figure, #article-body iframe { max-width: 100%; height: auto; border-radius: 10px; margin: 15px 0; display: block; }
        #pdf-viewer { width: 100%; height: 85vh; border: none; border-radius: 12px; }

        .srs-btns { display: flex; gap: 10px; margin-top: 20px; }
        .srs-btns button { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; color: white; cursor: pointer; }

        #floating-highlight { display: none; position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 14px 28px; border-radius: 30px; font-weight: 700; font-size: 16px; border: none; box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 1002; }

        .user-note { margin-top: 12px; padding: 12px; background: color-mix(in srgb, var(--bg) 50%, transparent); border-radius: 10px; border-left: 3px solid var(--accent); font-size: 15px; color: var(--text); }
        #sync-indicator { text-align:center; color:var(--accent); font-weight: bold; font-size:13px; padding-bottom:10px; display:none; }
        
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px;}
        .setting-row select, .setting-row input { background: var(--surface); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; color: var(--text); }
        
        .reader-controls { display: flex; justify-content: space-between; padding: 10px 0; align-items: center;}
        .reader-controls button { background: var(--surface); border: 1px solid var(--border); color: var(--accent); padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; cursor: pointer;}
        
        #toc-dropdown { display: none; position: absolute; top: 110px; left: 20px; right: 20px; max-height: 50vh; overflow-y: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 2000; padding: 10px;}
        .toc-item { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: 16px; }
        .toc-item:last-child { border-bottom: none; }
        .jump-btn { background: color-mix(in srgb, var(--accent) 15%, transparent); color: var(--accent); border: 1px solid var(--accent); padding: 6px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; float: right; cursor: pointer; margin-left: 10px;}

        .checkbox-overlay { display: none; position: absolute; top: 15px; right: 15px; width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 6px; pointer-events: none;}
        .edit-mode .checkbox-overlay { display: block; }
        .edit-mode .glass-card { padding-right: 50px; }
        .glass-card.selected { border-color: #FF3B30; background: color-mix(in srgb, #FF3B30 10%, var(--surface)); }
        .glass-card.selected .checkbox-overlay { background: #FF3B30; border-color: #FF3B30; }
        #bulk-delete-btn { display: none; background: #FF3B30; color: white; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; border: none; margin-bottom: 20px; cursor: pointer; }

        .active-filter-chip { display: flex; align-items: center; background: var(--accent); color: white; padding: 5px 12px; border-radius: 15px; font-size: 13px; margin-bottom: 15px; width: fit-content; font-weight: 600;}
        .active-filter-chip button { background: none; border: none; color: white; margin-left: 8px; cursor: pointer; font-size: 14px; padding: 0; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1 id="title">Inbox</h1>
        <div class="header-btns">
            <button class="icon-btn" onclick="startSRS()"><span class="material-symbols-outlined">psychology</span></button>
            <button class="icon-btn" onclick="openSettings()"><span class="material-symbols-outlined">settings</span></button>
        </div>
    </header>

    <div class="main-scroll-area" id="main-scroller">
        <div class="content-padding">
            <!-- FEED TAB -->
            <div id="view-feed" class="view">
                <div id="filter-bar" style="margin-bottom:15px; display:flex; gap:15px; overflow-x:auto; padding-bottom:10px; align-items: center;">
                    <button class="text-btn" onclick="filterFeed('all')">All</button>
                    <button class="text-btn" onclick="filterFeed('podcast')">Media</button>
                    <button class="text-btn" onclick="filterFeed('article')">Articles</button>
                    <button class="icon-btn" style="margin-left:auto;" onclick="refreshFeed(true)"><span class="material-symbols-outlined">sync</span></button>
                </div>
                
                <div class="search-bar" style="margin-bottom:15px;">
                    <span class="material-symbols-outlined" style="color:var(--sub); margin-right:10px;">search</span>
                    <input type="text" id="feed-search" placeholder="Search titles or authors..." onkeyup="renderFeedItems()">
                </div>
                
                <div id="active-source-container"></div>
                
                <div id="sync-indicator">↻ Streaming posts...</div>
                <div id="feed-list"></div>
            </div>

            <!-- LIBRARY TAB -->
            <div id="view-explore" class="view">
                <input type="file" id="file-in" accept=".epub,.pdf" style="display:none" onchange="openAndSaveLocalFile(event)">
                <button class="primary-btn" onclick="document.getElementById('file-in').click()">+ Add Ebook or PDF</button>

                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <select class="dropdown-select" id="library-filter" onchange="renderLibrary()" style="font-size:18px; font-weight:bold; background:var(--surface); padding:8px 12px; border-radius:12px; border:1px solid var(--border);">
                        <option value="all">All Library</option>
                        <option value="subs">Subscriptions</option>
                        <option value="epub">Ebooks</option>
                        <option value="pdf">PDFs</option>
                    </select>
                    <button class="text-btn" id="edit-lib-btn" onclick="toggleLibraryEditMode()">Edit</button>
                </div>

                <button id="bulk-delete-btn" onclick="deleteSelectedItems()">Delete Selected</button>

                <div class="search-bar" style="margin-bottom:15px;">
                    <span class="material-symbols-outlined" style="color:var(--sub); margin-right:10px;">search</span>
                    <input type="text" id="library-search" placeholder="Search library items..." onkeyup="renderLibrary()">
                </div>

                <div class="search-bar" id="sub-search-bar">
                    <select id="search-type">
                        <option value="podcast">Podcast</option>
                        <option value="reddit">Reddit</option>
                        <option value="youtube">Social / YT Link</option>
                    </select>
                    <input type="text" id="lib-search" placeholder="Paste IG, Threads, Bsky, YT...">
                    <button class="text-btn" onclick="searchExplore()">Find</button>
                </div>
                <div id="search-results"></div>
                <div id="library-list"></div>
            </div>

            <!-- INBOX TAB -->
            <div id="view-inbox" class="view active">
                <div id="inbox-list"></div>
            </div>
        </div>
    </div>

    <nav>
        <button onclick="switchTab('feed')" id="nav-feed"><span class="material-symbols-outlined">rss_feed</span>Feed</button>
        <button onclick="switchTab('explore')" id="nav-explore"><span class="material-symbols-outlined">library_books</span>Library</button>
        <button onclick="switchTab('inbox')" id="nav-inbox" class="active"><span class="material-symbols-outlined">inbox</span>Inbox</button>
    </nav>
</div>

<!-- SETTINGS MODAL -->
<div id="settings-modal" class="fullscreen-modal swipe-modal">
    <div class="modal-header touch-header">
        <div class="modal-drag-handle"></div>
        <h3 style="margin:0; font-size: 18px;">Settings</h3>
        <button class="icon-btn" onclick="closeModal('settings-modal')"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="modal-content">
        <div class="glass-card" style="padding: 10px 20px;">
            <div class="setting-row">
                <strong>Theme</strong>
                <select id="setting-theme" onchange="applySettings()">
                    <option value="light">Apple Light</option>
                    <option value="black">AMOLED Black</option>
                    <option value="catppuccin">Catppuccin Mocha</option>
                    <option value="gruvbox">Gruvbox Dark</option>
                    <option value="solarized">Solarized Dark</option>
                </select>
            </div>
            <div class="setting-row">
                <strong>Posts per Page</strong>
                <select id="setting-limit" onchange="applySettings()">
                    <option value="10">10 Items</option>
                    <option value="15">15 Items</option>
                    <option value="25">25 Items</option>
                </select>
            </div>
            <div class="setting-row">
                <strong>Review Buttons</strong>
                <select id="setting-srs" onchange="applySettings()">
                    <option value="3">3 (Hard, Good, Easy)</option>
                    <option value="2">2 (Hard, Easy)</option>
                </select>
            </div>
            <div class="setting-row" style="border-bottom:none;">
                <strong>Backup Data</strong>
                <input type="file" id="opml-in" style="display:none" onchange="importOPML(event)">
                <button class="text-btn" onclick="document.getElementById('opml-in').click()">Import OPML</button>
            </div>
        </div>
    </div>
</div>

<!-- NATIVE MEDIA READER OVERLAY -->
<div id="media-modal" class="fullscreen-modal swipe-modal" data-current-media-id="" data-current-type="" data-current-source="" data-current-link="">
    <div class="modal-header touch-header">
        <div class="modal-drag-handle"></div>
        <h3 id="modal-title" style="margin:0; font-size: 18px; max-width: 70%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Reader</h3>
        <button class="icon-btn" onclick="closeModal('media-modal')"><span class="material-symbols-outlined">close</span></button>
    </div>
    
    <div class="modal-content" id="modal-body" style="padding: 10px;">
        <div id="modal-audio-ui" style="display:none;">
            <div id="yt-container"></div>
            <button id="yt-handoff-btn" class="glass-card" style="display:none; width:100%; text-align:center; color:var(--accent); font-weight:bold; cursor:pointer; margin-bottom:15px;">↗ Open in YouTube App</button>
            <audio id="main-audio" controls style="width:100%; margin-bottom:15px; display:none;"></audio>
            <button id="snip-btn" class="text-btn" style="width:100%; background:var(--accent); color:white; padding:12px; border-radius:12px; margin-bottom:15px; font-weight:bold;" onclick="snipAudio()">✂️ Start Audio Snip</button>
            <div id="transcript-container" style="padding:0 15px;"></div>
        </div>

        <div id="modal-article-ui" style="display:none;">
            <div id="article-body"></div>
        </div>
        
        <div id="modal-ebook-ui" style="display:none;">
            <div class="reader-controls">
                <button onclick="document.getElementById('toc-dropdown').style.display = document.getElementById('toc-dropdown').style.display === 'block' ? 'none' : 'block'">☰ Chapters</button>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span class="material-symbols-outlined" style="font-size:18px;">light_mode</span>
                    <input type="range" id="brightness-slider" min="40" max="100" value="100" style="width:80px;" oninput="setEpubBrightness(this.value)">
                </div>
                <div>
                    <button onclick="changeEpubFontSize(-10)" style="padding:4px 10px; font-size:12px;">A-</button>
                    <button onclick="changeEpubFontSize(10)" style="padding:4px 10px; font-size:12px;">A+</button>
                </div>
            </div>
            <div id="toc-dropdown"></div>
            <div class="epub-container-wrapper">
                <div id="epub-viewer"></div>
            </div>
        </div>
        
        <div id="modal-pdf-ui" style="display:none;">
            <iframe id="pdf-viewer"></iframe>
        </div>
    </div>
    <button id="floating-highlight" onmousedown="saveSelectedText(event)">📝 Save Highlight</button>
</div>

<!-- SRS REVIEW OVERLAY -->
<div id="srs-modal" class="fullscreen-modal swipe-modal">
    <div class="modal-header touch-header">
        <div class="modal-drag-handle"></div>
        <h3 style="margin:0; font-size: 18px;">Daily Review</h3>
        <button class="icon-btn" onclick="closeModal('srs-modal')"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="modal-content" id="srs-body"></div>
</div>

<script>
    // --- DATABASE & INITIALIZATION ---
    function initDB() {
        let currentDB = JSON.parse(localStorage.getItem('recall_v3_db'));
        if (!currentDB || !currentDB.notes) currentDB = { subs: [], notes: [], feedCache: [], localMedia: [], lastSync: 0, settings: {} };
        const defSettings = { theme: 'black', feedLimit: 15, srsMode: 3 };
        currentDB.settings = { ...defSettings, ...(currentDB.settings || {}) };
        if(!currentDB.localMedia) currentDB.localMedia = [];
        return currentDB;
    }
    
    let db = initDB();
    let rendition = null;
    let epubBook = null;
    let ytPlayer = null; 
    let srsQueue = [];
    let epubFontSize = 100;
    let currentFeedSource = 'all';
    let activeFeedFilter = 'all';
    let displayLimit = parseInt(db.settings.feedLimit) || 15;
    let isEditMode = false;
    let selectedItems = [];

    document.documentElement.className = 'theme-' + db.settings.theme;
    document.getElementById('setting-theme').value = db.settings.theme;
    document.getElementById('setting-limit').value = db.settings.feedLimit;
    document.getElementById('setting-srs').value = db.settings.srsMode;

    function save() { localStorage.setItem('recall_v3_db', JSON.stringify(db)); }

    // --- TOUCH & SWIPE LOGIC ---
    let ptrStartY = 0;
    const scroller = document.getElementById('main-scroller');
    scroller.addEventListener('touchstart', e => { if (scroller.scrollTop <= 0 && document.getElementById('view-feed').classList.contains('active')) ptrStartY = e.touches[0].clientY; }, {passive: true});
    scroller.addEventListener('touchend', e => { if (ptrStartY > 0 && (e.changedTouches[0].clientY - ptrStartY) > 120) refreshFeed(true); ptrStartY = 0; });

    let touchStartY = 0;
    let swipeModal = null;
    document.querySelectorAll('.touch-header').forEach(header => {
        header.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; swipeModal = header.closest('.swipe-modal'); if(swipeModal) swipeModal.style.transition = 'none'; }, {passive: true});
        header.addEventListener('touchmove', e => { if(!swipeModal) return; let diff = e.touches[0].clientY - touchStartY; if(diff > 0) swipeModal.style.transform = `translateY(${diff}px)`; }, {passive: true});
        header.addEventListener('touchend', e => { if(!swipeModal) return; let diff = e.changedTouches[0].clientY - touchStartY; swipeModal.style.transition = 'transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)'; if(diff > 120) closeModal(swipeModal.id); else swipeModal.style.transform = 'translateY(0)'; swipeModal = null; });
    });
    
    // --- UI TABS & NAVIGATION ---
    function switchTab(tab) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('active');
        document.getElementById('nav-' + tab).classList.add('active');
        document.getElementById('title').innerText = { feed: "Feed", explore: "Library", inbox: "Inbox" }[tab];
        isEditMode = false; document.getElementById('library-list').classList.remove('edit-mode'); document.getElementById('bulk-delete-btn').style.display = 'none';
        if(tab === 'feed') renderFeedItems(); 
        if(tab === 'inbox') renderInbox();
        if(tab === 'explore') renderLibrary();
    }

    function openSettings() { const modal = document.getElementById('settings-modal'); modal.style.display = 'flex'; document.body.classList.add('modal-open'); setTimeout(() => modal.classList.add('open'), 10); }
    function applySettings() { db.settings.theme = document.getElementById('setting-theme').value; db.settings.feedLimit = parseInt(document.getElementById('setting-limit').value); db.settings.srsMode = parseInt(document.getElementById('setting-srs').value); save(); document.documentElement.className = 'theme-' + db.settings.theme; displayLimit = db.settings.feedLimit; if (document.getElementById('view-feed').classList.contains('active')) renderFeedItems(); }
    function closeModal(id) { const m = document.getElementById(id); m.style.transform = 'translateY(100%)'; setTimeout(() => { m.classList.remove('open'); m.style.display = 'none'; m.style.transform = ''; document.body.classList.remove('modal-open'); }, 300); if(id === 'media-modal') { document.getElementById('main-audio').pause(); document.getElementById('yt-container').innerHTML = ''; document.getElementById('yt-handoff-btn').style.display = 'none'; snipStartTime = null; const snipBtn = document.getElementById('snip-btn'); if(snipBtn) { snipBtn.innerText = "✂️ Start Audio Snip"; snipBtn.style.background = "var(--accent)"; } if(ytPlayer) ytPlayer = null; document.getElementById('toc-dropdown').style.display = 'none'; document.getElementById('epub-viewer').innerHTML = ''; } }

    // --- LIBRARY & FILTERING ---
    function filterFeedBySource(sourceName) { currentFeedSource = sourceName; document.getElementById('active-source-container').innerHTML = `<div class="active-filter-chip"><span>Filtering by: ${sourceName}</span><button onclick="clearSourceFilter()"><span class="material-symbols-outlined">close</span></button></div>`; switchTab('feed'); }
    function clearSourceFilter() { currentFeedSource = 'all'; document.getElementById('active-source-container').innerHTML = ''; renderFeedItems(); }
    function renderLibrary() {
        const list = document.getElementById('library-list'); const filter = document.getElementById('library-filter').value; const searchQuery = (document.getElementById('library-search')?.value || "").toLowerCase();
        document.getElementById('sub-search-bar').style.display = (filter === 'all' || filter === 'subs') ? 'flex' : 'none';
        list.innerHTML = ""; selectedItems = [];
        if (filter === 'all' || filter === 'subs') db.subs.forEach((s, i) => { if(!searchQuery || s.title.toLowerCase().includes(searchQuery)) list.innerHTML += createLibraryCard('sub', i, s.title, 'Subscription'); });
        if (filter === 'all' || filter === 'epub' || filter === 'pdf') db.localMedia.forEach((m, i) => { if((filter === 'all' || filter === m.type) && (!searchQuery || m.name.toLowerCase().includes(searchQuery))) { const hlCount = db.notes.filter(n => n.mediaId === m.id).length; list.innerHTML += createLibraryCard('media', i, m.name, `${m.type.toUpperCase()} • ${hlCount} Highlights`, m.id); } });
        if(list.innerHTML === "") list.innerHTML = "<p style='text-align:center; color:var(--sub);'>No items found.</p>";
    }
    function createLibraryCard(type, index, title, meta, mediaId = null) { const safeTitle = title.replace(/'/g, "\\'"); const clickAction = type === 'sub' ? `if(isEditMode){toggleSelect('${type}',${index})}else{filterFeedBySource('${safeTitle}')}` : `if(isEditMode){toggleSelect('${type}',${index})}else{loadSavedMedia('${mediaId}', '${safeTitle}')}`; return `<div class="glass-card" id="lib-card-${type}-${index}" onclick="${clickAction}" style="cursor:pointer;"><div class="checkbox-overlay"></div><span class="item-title" style="margin-right:20px;">${title}</span><span class="item-meta">${meta}</span></div>`; }
    function toggleLibraryEditMode() { isEditMode = !isEditMode; const list = document.getElementById('library-list'); const btn = document.getElementById('bulk-delete-btn'); if (isEditMode) { list.classList.add('edit-mode'); btn.style.display = 'block'; document.getElementById('edit-lib-btn').innerText = "Done"; } else { list.classList.remove('edit-mode'); btn.style.display = 'none'; document.getElementById('edit-lib-btn').innerText = "Edit"; selectedItems = []; renderLibrary(); } }
    function toggleSelect(type, index) { const id = `${type}-${index}`; if (selectedItems.includes(id)) { selectedItems = selectedItems.filter(i => i !== id); document.getElementById(`lib-card-${id}`).classList.remove('selected'); } else { selectedItems.push(id); document.getElementById(`lib-card-${id}`).classList.add('selected'); } document.getElementById('bulk-delete-btn').innerText = `Delete (${selectedItems.length})`; }
    async function deleteSelectedItems() { if(selectedItems.length === 0 || !confirm(`Delete ${selectedItems.length} items?`)) return; const subsToDelete = selectedItems.filter(id => id.startsWith('sub-')).map(id => parseInt(id.split('-')[1])).sort((a,b)=>b-a); const mediaToDelete = selectedItems.filter(id => id.startsWith('media-')).map(id => parseInt(id.split('-')[1])).sort((a,b)=>b-a); subsToDelete.forEach(i => db.subs.splice(i, 1)); for (let i of mediaToDelete) { await localforage.removeItem('media_' + db.localMedia[i].id); db.localMedia.splice(i, 1); } save(); toggleLibraryEditMode(); renderLibrary(); }

    // --- ROBUST EPUB LOADER ---
    async function openAndSaveLocalFile(e) { const file = e.target.files[0]; if (!file) return; const id = Date.now().toString(); const type = file.name.toLowerCase().endsWith('.pdf') ? 'pdf' : 'epub'; await localforage.setItem('media_' + id, file); db.localMedia.push({ id, name: file.name, type, date: new Date().toISOString() }); save(); document.getElementById('library-filter').value = type; renderLibrary(); alert(`${file.name} added to Library!`); }
    async function loadSavedMedia(id, title, jumpTarget = null) {
        const file = await localforage.getItem('media_' + id); if(!file) return alert("File not found on device.");
        const modal = document.getElementById('media-modal'); modal.style.display = 'flex'; document.getElementById('modal-title').innerText = title;
        modal.dataset.currentMediaId = id; modal.dataset.currentType = title.toLowerCase().endsWith('.pdf') ? 'pdf' : 'epub'; modal.dataset.currentSource = title;
        document.getElementById('modal-audio-ui').style.display = 'none'; document.getElementById('modal-article-ui').style.display = 'none'; document.getElementById('modal-ebook-ui').style.display = 'none'; document.getElementById('modal-pdf-ui').style.display = 'none';
        if(modal.dataset.currentType === 'pdf') { document.getElementById('modal-pdf-ui').style.display = 'block'; document.getElementById('pdf-viewer').src = URL.createObjectURL(file); document.body.classList.add('modal-open'); setTimeout(() => modal.classList.add('open'), 10); } 
        else {
            document.getElementById('modal-ebook-ui').style.display = 'block'; document.getElementById('epub-viewer').innerHTML = ''; document.body.classList.add('modal-open');
            setTimeout(() => { modal.classList.add('open');
                setTimeout(() => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try { epubBook = ePub(e.target.result); rendition = epubBook.renderTo("epub-viewer", { width: "100%", height: "100%", manager: "default", flow: "paginated", spread: "none" });
                            if (jumpTarget) rendition.display(jumpTarget); else rendition.display();
                            epubBook.loaded.navigation.then(toc => { if(toc && toc.length > 0) document.getElementById('toc-dropdown').innerHTML = toc.map(c => `<div class="toc-item" onclick="rendition.display('${c.href}'); document.getElementById('toc-dropdown').style.display='none';">${c.label}</div>`).join(''); else document.getElementById('toc-dropdown').innerHTML = "<div class='toc-item'>No Chapters Found</div>"; });
                            let tsX = 0; rendition.on('touchstart', ev => tsX = ev.changedTouches[0].screenX);
                            rendition.on('touchend', ev => { let dx = ev.changedTouches[0].screenX - tsX; if (dx < -50) rendition.next(); if (dx > 50) rendition.prev(); });
                            rendition.on("selected", cfi => { const btn = document.getElementById('floating-highlight'); btn.style.display = 'block'; btn.dataset.cfi = cfi; });
                        } catch (err) { alert("Memory limit reached. Try a smaller file."); }
                    }; reader.readAsArrayBuffer(file);
                }, 500);
            }, 10);
        }
    }
    function changeEpubFontSize(amount) { if(rendition) { epubFontSize += amount; rendition.themes.fontSize(epubFontSize + "%"); } }
    function setEpubBrightness(val) { document.getElementById('epub-viewer').style.filter = `brightness(${val}%)`; }

    // --- FEED ENGINE & SEARCH ---
    async function refreshFeed(force = false) {
        const syncInd = document.getElementById('sync-indicator');
        if (db.feedCache && db.feedCache.length > 0) renderFeedItems();
        if (!force && db.lastSync && (Date.now() - db.lastSync < 1800000)) return; 
        syncInd.style.display = 'block';
        let completed = 0; const totalReqs = db.subs.length;
        if (totalReqs === 0) return syncInd.style.display = 'none';

        db.subs.forEach(async (sub) => {
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(sub.url.trim())}`);
                const data = await res.json();
                const xml = new DOMParser().parseFromString(data.contents, "text/xml");
                const entries = Array.from(xml.querySelectorAll("item, entry")).slice(0, 8);
                entries.forEach(node => {
                    const title = node.querySelector("title")?.textContent || "Untitled";
                    const link = node.querySelector("link")?.textContent || node.querySelector("link")?.getAttribute("href") || "";
                    if ((link.includes('youtube.com') || link.includes('youtu.be')) && title.toLowerCase().includes('#shorts')) return;
                    if (!db.feedCache.find(i => i.link === link)) {
                        db.feedCache.push({ title, link, pubDate: node.querySelector("pubDate, published, updated")?.textContent || new Date().toISOString(), source: sub.title, type: link.includes('youtube') ? 'podcast' : 'article' });
                    }
                });
                db.feedCache.sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));
                renderFeedItems();
            } catch (e) {} finally { completed++; if(completed === totalReqs) { syncInd.style.display = 'none'; db.lastSync = Date.now(); save(); } }
        });
    }

    function filterFeed(type) { activeFeedFilter = type; renderFeedItems(); }
    function renderFeedItems() {
        const list = document.getElementById('feed-list'); const query = (document.getElementById('feed-search')?.value || "").toLowerCase();
        const filtered = db.feedCache.filter(i => (activeFeedFilter === 'all' || i.type === activeFeedFilter) && (currentFeedSource === 'all' || i.source === currentFeedSource) && (!query || i.title.toLowerCase().includes(query) || i.source.toLowerCase().includes(query)));
        list.innerHTML = filtered.slice(0, displayLimit).map(item => `<div class="glass-card" onclick='openMediaModal(${JSON.stringify(item).replace(/'/g, "&apos;")})'><span class="item-meta">${item.source} • ${new Date(item.pubDate).toLocaleDateString()}</span><span class="item-title">${item.title}</span></div>`).join('');
        if (filtered.length > displayLimit) list.innerHTML += `<button class="glass-card" style="width:100%; text-align:center; color:var(--accent); font-weight:bold;" onclick="displayLimit += 15; renderFeedItems()">Load More ↓</button>`;
    }

    async function openMediaModal(item) {
        const modal = document.getElementById('media-modal'); modal.style.display = 'flex'; document.body.classList.add('modal-open'); setTimeout(() => modal.classList.add('open'), 10);
        document.getElementById('modal-title').innerText = item.title;
        modal.dataset.currentType = item.type; modal.dataset.currentLink = item.link;
        document.getElementById('modal-audio-ui').style.display = 'none'; document.getElementById('modal-article-ui').style.display = 'none';
        if(item.type === 'podcast') {
            document.getElementById('modal-audio-ui').style.display = 'block';
            if(item.link.includes('youtube')) {
                const vidId = item.link.includes('v=') ? item.link.split('v=')[1].split('&')[0] : item.link.split('youtu.be/')[1].split('?')[0];
                document.getElementById('yt-container').innerHTML = `<iframe id="main-video" src="https://www.youtube.com/embed/${vidId}?enablejsapi=1" style="width:100%; aspect-ratio:16/9; border-radius:12px; border:none;" allowfullscreen></iframe>`;
                setTimeout(() => ytPlayer = new YT.Player('main-video'), 1000);
            } else { document.getElementById('main-audio').src = item.link; document.getElementById('main-audio').style.display = 'block'; }
        } else {
            document.getElementById('modal-article-ui').style.display = 'block';
            document.getElementById('article-body').innerHTML = `<p style="text-align:center; color:var(--accent);">Extracting full text...</p>`;
            try { const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(item.link)}`); const json = await res.json(); const doc = new DOMParser().parseFromString(json.contents, 'text/html'); const reader = new Readability(doc); const article = reader.parse(); document.getElementById('article-body').innerHTML = article ? article.content : "Snippet not available."; } catch(e) { document.getElementById('article-body').innerHTML = "Full text blocked."; }
            document.getElementById('article-body').innerHTML += `<div style="text-align:center; margin-top:20px;"><button class="primary-btn" onclick="window.open('${item.link}', '_blank')">Open Original</button></div>`;
        }
    }

    // Snipping and highlighting remain functional with current linkTarget logic
    let snipStartTime = null;
    function snipAudio() {
        const btn = document.getElementById('snip-btn'); let time = 0;
        if(ytPlayer && ytPlayer.getCurrentTime) time = Math.floor(ytPlayer.getCurrentTime());
        if(snipStartTime === null) { snipStartTime = time; btn.innerText = "⏹ End Snip"; btn.style.background = "#FF3B30"; } 
        else { const thought = prompt(`Snipped ${snipStartTime}s to ${time}s. Summary:`); if(thought) saveNote(`[${snipStartTime}s-${time}s] ${thought}`, document.getElementById('modal-title').innerText, 'podcast', document.getElementById('media-modal').dataset.currentLink); snipStartTime = null; btn.innerText = "✂️ Start Audio Snip"; btn.style.background = "var(--accent)"; }
    }
    function saveNote(text, source, type, linkTarget) { db.notes.push({ id: Date.now().toString(), text, source, type, linkTarget, date: new Date().toISOString(), nextReview: Date.now(), interval: 1, ease: 2.5, history: [] }); save(); renderInbox(); }
    function renderInbox() { document.getElementById('inbox-list').innerHTML = db.notes.length ? db.notes.sort((a,b)=>b.id-a.id).map(n => `<div class="glass-card"><button class="jump-btn" onclick="jumpToSource('${n.id}')">↗ Source</button><span class="item-meta">${n.source}</span><span class="item-title" style="font-size:16px;">${n.text}</span></div>`).join('') : '<p style="text-align:center; color:var(--sub); margin-top:40px;">Empty</p>'; }
    function jumpToSource(id) { const n = db.notes.find(x => x.id === id); if(n.type === 'epub') loadSavedMedia(n.mediaId, n.source, n.linkTarget); else window.open(n.linkTarget, '_blank'); }
    
    switchTab('inbox');
</script>
