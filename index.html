<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Recall — Media Hub</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.88/epub.min.js"></script>
    <script src="https://unpkg.com/@mozilla/readability/Readability.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <style>
        :root { 
            --bg: #F2F2F7; --surface: #FFFFFF; --text: #1C1C1E; --sub: #8E8E93; --accent: #007AFF; --border: #E5E5EA;
        }
        html.theme-black { 
            --bg: #000000; --surface: #1C1C1E; --text: #FFFFFF; --sub: #8E8E93; --accent: #0A84FF; --border: #38383A;
        }
        html.theme-catppuccin { 
            --bg: #1e1e2e; --surface: #313244; --text: #cdd6f4; --sub: #a6adc8; --accent: #89b4fa; --border: #45475a;
        }
        html.theme-gruvbox { 
            --bg: #282828; --surface: #3c3836; --text: #ebdbb2; --sub: #928374; --accent: #fe8019; --border: #504945;
        }
        html.theme-solarized { 
            --bg: #002b36; --surface: #073642; --text: #839496; --sub: #586e75; --accent: #268bd2; --border: #073642;
        }

        /* STRICT MOBILE SAFARI LAYOUT FIX */
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; 
            background-color: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            touch-action: pan-y; /* Prevents whole-page zooming/bouncing */
        }
        
        .app-container {
            display: flex; flex-direction: column; height: 100%; width: 100%;
        }

        .main-scroll-area {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 20px;
        }

        header { padding: 60px 25px 20px 25px; position: sticky; top: 0; z-index: 10; background: color-mix(in srgb, var(--bg) 80%, transparent); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        header h1 { font-size: 34px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .header-btns { display: flex; gap: 12px; }
        .icon-btn { background: none; border: none; color: var(--accent); cursor: pointer; padding: 0; display:flex; align-items:center; justify-content:center; }

        .content-padding { padding: 20px; }

        .glass-card { background: color-mix(in srgb, var(--surface) 60%, transparent); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid color-mix(in srgb, var(--text) 10%, transparent); border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.05); transition: transform 0.1s; position: relative; }
        .item-title { font-size: 19px; font-weight: 700; margin-bottom: 8px; display: block; line-height: 1.3; }
        .item-meta { font-size: 13px; color: var(--sub); display: block; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 6px;}
        .feed-img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 12px; margin-top: 12px; border: 1px solid var(--border); }
        .inbox-img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; float: right; margin-left: 10px; border: 1px solid var(--border); }

        nav { height: max(65px, env(safe-area-inset-bottom) + 50px); background: color-mix(in srgb, var(--surface) 85%, transparent); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-around; border-top: 1px solid var(--border); padding-top: 10px; padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0; }
        nav button { background: none; border: none; color: var(--sub); font-size: 11px; font-weight: 500; display:flex; flex-direction:column; align-items:center; gap:4px; height: 100%; cursor: pointer;}
        nav button.active { color: var(--accent); }

        .search-bar { background: var(--surface); border-radius: 12px; padding: 8px 15px; margin-bottom: 20px; display: flex; align-items: center; border: 1px solid var(--border); }
        .search-bar select, .dropdown-select { background: none; border: none; color: var(--accent); font-weight: 600; outline: none; font-size: 15px; margin-right: 10px; }
        input { background: none; border: none; color: var(--text); outline: none; font-size: 16px; width: 100%; padding: 10px 0; }
        .text-btn { background: none; border: none; color: var(--accent); font-size: 16px; font-weight: 600; cursor: pointer; padding:0;}
        .primary-btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; width: 100%; display: block; margin-bottom: 20px; text-align: center;}

        .view { display: none; } .view.active { display: block; }

        /* --- MODALS --- */
        .fullscreen-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: none; flex-direction: column; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .fullscreen-modal.open { transform: translateY(0); }
        .modal-header { padding: max(20px, env(safe-area-inset-top)) 20px 15px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .modal-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 60px; -webkit-user-select: text; user-select: text; -webkit-overflow-scrolling: touch; }
        
        #epub-viewer { width: 100%; height: 100%; background: var(--surface); margin: 0; overflow: hidden; border: none; transition: filter 0.2s ease;}
        .epub-container-wrapper { height: 70vh; width: 100%; border-radius: 12px; overflow: hidden; margin-top: 10px; }
        
        #article-body, #transcript-container { font-size: 18px; line-height: 1.6; color: var(--text); padding: 0 10px; overflow-wrap: break-word;}
        #article-body img, #article-body figure, #article-body iframe { max-width: 100%; height: auto; border-radius: 10px; margin: 15px 0; display: block; }
        #pdf-viewer { width: 100%; height: 85vh; border: none; border-radius: 12px; }

        .srs-btns { display: flex; gap: 10px; margin-top: 20px; }
        .srs-btns button { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; color: white; cursor: pointer; }

        #floating-highlight { display: none; position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 14px 28px; border-radius: 30px; font-weight: 700; font-size: 16px; border: none; box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 1002; }

        .user-note { margin-top: 12px; padding: 12px; background: color-mix(in srgb, var(--bg) 50%, transparent); border-radius: 10px; border-left: 3px solid var(--accent); font-size: 15px; color: var(--text); }
        #sync-indicator { text-align:center; color:var(--accent); font-weight: bold; font-size:13px; padding-bottom:10px; display:none; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .setting-row select { background: var(--surface); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; color: var(--text); }
        
        /* Reader Controls */
        .reader-controls { display: flex; justify-content: space-between; padding: 10px 0; align-items: center;}
        .reader-controls button { background: var(--surface); border: 1px solid var(--border); color: var(--accent); padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; cursor: pointer;}
        
        /* TOC Dropdown */
        #toc-dropdown { display: none; position: absolute; top: 110px; left: 20px; right: 20px; max-height: 50vh; overflow-y: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 2000; padding: 10px;}
        .toc-item { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: 16px; }
        .toc-item:last-child { border-bottom: none; }
        
        .jump-btn { background: color-mix(in srgb, var(--accent) 15%, transparent); color: var(--accent); border: 1px solid var(--accent); padding: 6px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; float: right; cursor: pointer; }

        /* Edit Mode Styles */
        .checkbox-overlay { display: none; position: absolute; top: 15px; right: 15px; width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 6px; }
        .edit-mode .checkbox-overlay { display: block; }
        .edit-mode .glass-card { padding-right: 50px; }
        .glass-card.selected { border-color: #FF3B30; background: color-mix(in srgb, #FF3B30 10%, var(--surface)); }
        .glass-card.selected .checkbox-overlay { background: #FF3B30; border-color: #FF3B30; }
        #bulk-delete-btn { display: none; background: #FF3B30; color: white; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; border: none; margin-bottom: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1 id="title">Inbox</h1>
        <div class="header-btns">
            <button class="icon-btn" onclick="startSRS()"><span class="material-symbols-outlined">psychology</span></button>
            <button class="icon-btn" onclick="openSettings()"><span class="material-symbols-outlined">settings</span></button>
        </div>
    </header>

    <div class="main-scroll-area">
        <div class="content-padding">
            <!-- FEED TAB -->
            <div id="view-feed" class="view">
                <div id="filter-bar" style="margin-bottom:15px; display:flex; gap:15px; overflow-x:auto; padding-bottom:10px; align-items: center;">
                    <button class="text-btn" onclick="filterFeed('all')">All</button>
                    <button class="text-btn" onclick="filterFeed('podcast')">Media</button>
                    <button class="text-btn" onclick="filterFeed('article')">Articles</button>
                    <button class="icon-btn" style="margin-left:auto;" onclick="refreshFeed(true)"><span class="material-symbols-outlined">sync</span></button>
                </div>
                <div id="sync-indicator">↻ Streaming posts...</div>
                <div id="feed-list"></div>
            </div>

            <!-- EXPLORE / LIBRARY TAB -->
            <div id="view-explore" class="view">
                <input type="file" id="file-in" accept=".epub,.pdf" style="display:none" onchange="openAndSaveLocalFile(event)">
                <button class="primary-btn" onclick="document.getElementById('file-in').click()">+ Add Ebook or PDF</button>

                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <select class="dropdown-select" id="library-filter" onchange="renderLibrary()" style="font-size:18px; font-weight:bold; background:var(--surface); padding:8px 12px; border-radius:12px; border:1px solid var(--border);">
                        <option value="all">All Library</option>
                        <option value="subs">Subscriptions</option>
                        <option value="epub">Ebooks</option>
                        <option value="pdf">PDFs</option>
                    </select>
                    <button class="text-btn" id="edit-lib-btn" onclick="toggleLibraryEditMode()">Edit</button>
                </div>

                <button id="bulk-delete-btn" onclick="deleteSelectedItems()">Delete Selected</button>

                <div class="search-bar" id="sub-search-bar">
                    <select id="search-type">
                        <option value="podcast">Podcasts</option>
                        <option value="reddit">Reddit</option>
                        <option value="youtube">YouTube</option>
                    </select>
                    <input type="text" id="lib-search" placeholder="Search or paste channel...">
                    <button class="text-btn" onclick="searchExplore()">Find</button>
                </div>
                <div id="search-results"></div>
                <div id="library-list"></div>
            </div>

            <!-- INBOX TAB -->
            <div id="view-inbox" class="view active">
                <div id="inbox-list"></div>
            </div>
        </div>
    </div>

    <nav>
        <button onclick="switchTab('feed')" id="nav-feed"><span class="material-symbols-outlined">rss_feed</span>Feed</button>
        <button onclick="switchTab('explore')" id="nav-explore"><span class="material-symbols-outlined">library_books</span>Library</button>
        <button onclick="switchTab('inbox')" id="nav-inbox" class="active"><span class="material-symbols-outlined">inbox</span>Inbox</button>
    </nav>
</div>

<!-- SETTINGS MODAL -->
<div id="settings-modal" class="fullscreen-modal">
    <div class="modal-header">
        <h3 style="margin:0; font-size: 18px;">Settings</h3>
        <button class="icon-btn" onclick="closeModal('settings-modal')"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="modal-content">
        <div class="glass-card" style="padding: 10px 20px;">
            <div class="setting-row">
                <strong>Theme</strong>
                <select id="setting-theme" onchange="applySettings()">
                    <option value="light">Apple Light</option>
                    <option value="black">AMOLED Black</option>
                    <option value="catppuccin">Catppuccin Mocha</option>
                    <option value="gruvbox">Gruvbox Dark</option>
                    <option value="solarized">Solarized Dark</option>
                </select>
            </div>
            <div class="setting-row">
                <strong>Posts per Page</strong>
                <select id="setting-limit" onchange="applySettings()">
                    <option value="10">10 Items</option>
                    <option value="15">15 Items</option>
                    <option value="25">25 Items</option>
                    <option value="50">50 Items</option>
                </select>
            </div>
            <div class="setting-row">
                <strong>Review Buttons</strong>
                <select id="setting-srs" onchange="applySettings()">
                    <option value="3">3 (Hard, Good, Easy)</option>
                    <option value="2">2 (Hard, Easy)</option>
                </select>
            </div>
            <div class="setting-row" style="border-bottom:none;">
                <strong>Backup Data</strong>
                <input type="file" id="opml-in" style="display:none" onchange="importOPML(event)">
                <button class="text-btn" onclick="document.getElementById('opml-in').click()">Import OPML</button>
            </div>
        </div>
    </div>
</div>

<!-- NATIVE MEDIA READER OVERLAY -->
<div id="media-modal" class="fullscreen-modal" data-current-media-id="" data-current-type="" data-current-source="">
    <div class="modal-header">
        <h3 id="modal-title" style="margin:0; font-size: 18px; max-width: 70%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Reader</h3>
        <button class="icon-btn" onclick="closeModal('media-modal')"><span class="material-symbols-outlined">close</span></button>
    </div>
    
    <div class="modal-content" id="modal-body" style="padding: 10px;">
        
        <div id="modal-audio-ui" style="display:none;">
            <iframe id="main-video" style="width:100%; aspect-ratio:16/9; border-radius:12px; border:none; margin-bottom:15px; display:none;" allowfullscreen></iframe>
            <audio id="main-audio" controls style="width:100%; margin-bottom:15px; display:none;"></audio>
            <button class="text-btn" style="width:100%; background:var(--accent); color:white; padding:12px; border-radius:12px; margin-bottom:15px;" onclick="snipAudio()">✂️ Snip Moment to Inbox</button>
            <div id="transcript-container" style="padding:0 15px;"></div>
        </div>

        <div id="modal-article-ui" style="display:none;">
            <div id="article-body"></div>
        </div>
        
        <div id="modal-ebook-ui" style="display:none;">
            <div class="reader-controls">
                <button onclick="document.getElementById('toc-dropdown').style.display = document.getElementById('toc-dropdown').style.display === 'block' ? 'none' : 'block'">☰ Chapters</button>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span class="material-symbols-outlined" style="font-size:18px;">light_mode</span>
                    <input type="range" id="brightness-slider" min="40" max="100" value="100" style="width:80px;" oninput="setEpubBrightness(this.value)">
                </div>
                <div>
                    <button onclick="changeEpubFontSize(-10)" style="padding:4px 10px; font-size:12px;">A-</button>
                    <button onclick="changeEpubFontSize(10)" style="padding:4px 10px; font-size:12px;">A+</button>
                </div>
            </div>
            
            <div id="toc-dropdown"></div>

            <div class="epub-container-wrapper">
                <div id="epub-viewer"></div>
            </div>
            
            <div class="reader-controls" style="margin-top:10px; justify-content:center; gap:20px;">
                <button onclick="rendition.prev()">← Prev</button>
                <button onclick="rendition.next()">Next →</button>
            </div>
        </div>
        
        <div id="modal-pdf-ui" style="display:none;">
            <iframe id="pdf-viewer"></iframe>
        </div>
    </div>
    <button id="floating-highlight" onmousedown="saveSelectedText(event)">📝 Save Highlight</button>
</div>

<!-- SRS REVIEW OVERLAY -->
<div id="srs-modal" class="fullscreen-modal">
    <div class="modal-header">
        <h3 style="margin:0; font-size: 18px;">Daily Review</h3>
        <button class="icon-btn" onclick="closeModal('srs-modal')"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="modal-content" id="srs-body"></div>
</div>

<script>
    // --- INIT DB & SETTINGS ---
    function initDB() {
        let currentDB = JSON.parse(localStorage.getItem('recall_v3_db'));
        if (!currentDB || !currentDB.notes) currentDB = { subs: [], notes: [], feedCache: [], localMedia: [], lastSync: 0, settings: { theme: 'black', feedLimit: 15, srsMode: 3 } };
        if(!currentDB.settings) currentDB.settings = { theme: 'black', feedLimit: 15, srsMode: 3 };
        if(!currentDB.localMedia) currentDB.localMedia = [];
        return currentDB;
    }
    
    let db = initDB();
    let rendition = null;
    let epubBook = null;
    let srsQueue = [];
    let epubFontSize = 100;
    
    let activeFeedFilter = 'all';
    let displayLimit = parseInt(db.settings.feedLimit) || 15;
    let isEditMode = false;
    let selectedItems = [];

    // Apply Settings
    document.documentElement.className = 'theme-' + db.settings.theme;
    document.getElementById('setting-theme').value = db.settings.theme;
    document.getElementById('setting-limit').value = db.settings.feedLimit;
    document.getElementById('setting-srs').value = db.settings.srsMode;

    function save() { localStorage.setItem('recall_v3_db', JSON.stringify(db)); }

    function switchTab(tab) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('active');
        document.getElementById('nav-' + tab).classList.add('active');
        
        let titleMap = { feed: "Feed", explore: "Library", inbox: "Inbox" };
        document.getElementById('title').innerText = titleMap[tab];
        isEditMode = false;
        document.getElementById('library-list').classList.remove('edit-mode');
        document.getElementById('bulk-delete-btn').style.display = 'none';
        
        if(tab === 'feed') refreshFeed(false);
        if(tab === 'inbox') renderInbox();
        if(tab === 'explore') renderLibrary();
    }

    function openSettings() {
        const modal = document.getElementById('settings-modal');
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('open'), 10);
    }

    function applySettings() {
        db.settings.theme = document.getElementById('setting-theme').value;
        db.settings.feedLimit = parseInt(document.getElementById('setting-limit').value);
        db.settings.srsMode = parseInt(document.getElementById('setting-srs').value);
        
        document.documentElement.className = 'theme-' + db.settings.theme;
        displayLimit = db.settings.feedLimit;
        save();
        if (document.getElementById('view-feed').classList.contains('active')) renderFeedItems();
    }

    function closeModal(id) {
        const m = document.getElementById(id);
        m.classList.remove('open');
        if(id === 'media-modal') {
            document.getElementById('main-audio').pause();
            document.getElementById('main-video').src = '';
            document.getElementById('toc-dropdown').style.display = 'none';
        }
        setTimeout(() => { m.style.display = 'none'; }, 300);
    }

    // --- LIBRARY (SUBS, EBOOKS, PDFS) & BULK EDIT ---
    function renderLibrary() {
        const list = document.getElementById('library-list');
        const filter = document.getElementById('library-filter').value;
        const searchBar = document.getElementById('sub-search-bar');
        
        searchBar.style.display = (filter === 'all' || filter === 'subs') ? 'flex' : 'none';
        list.innerHTML = "";
        selectedItems = [];

        if (filter === 'all' || filter === 'subs') {
            db.subs.forEach((s, i) => { list.innerHTML += createLibraryCard('sub', i, s.title, 'Subscription'); });
        }
        if (filter === 'all' || filter === 'epub' || filter === 'pdf') {
            db.localMedia.forEach((m, i) => {
                if(filter !== 'all' && filter !== m.type) return;
                const hlCount = db.notes.filter(n => n.mediaId === m.id).length;
                list.innerHTML += createLibraryCard('media', i, m.name, `${m.type.toUpperCase()} • ${hlCount} Highlights`, m.id);
            });
        }
        if(list.innerHTML === "") list.innerHTML = "<p style='text-align:center; color:var(--sub);'>No items found.</p>";
    }

    function createLibraryCard(type, index, title, meta, mediaId = null) {
        const clickAction = type === 'sub' ? '' : `onclick="if(!isEditMode) loadSavedMedia('${mediaId}', '${title.replace(/'/g, "\\'")}')"`;
        return `
            <div class="glass-card" id="lib-card-${type}-${index}" ${clickAction} style="${type==='sub'?'cursor:default;':''}">
                <div class="checkbox-overlay" onclick="event.stopPropagation(); toggleSelect('${type}', ${index})"></div>
                <span class="item-title" style="margin-right:20px;">${title}</span>
                <span class="item-meta">${meta}</span>
            </div>
        `;
    }

    function toggleLibraryEditMode() {
        isEditMode = !isEditMode;
        const list = document.getElementById('library-list');
        const btn = document.getElementById('bulk-delete-btn');
        if (isEditMode) {
            list.classList.add('edit-mode'); btn.style.display = 'block'; document.getElementById('edit-lib-btn').innerText = "Done";
        } else {
            list.classList.remove('edit-mode'); btn.style.display = 'none'; document.getElementById('edit-lib-btn').innerText = "Edit";
            selectedItems = []; renderLibrary(); 
        }
    }

    function toggleSelect(type, index) {
        const card = document.getElementById(`lib-card-${type}-${index}`);
        const id = `${type}-${index}`;
        if (selectedItems.includes(id)) {
            selectedItems = selectedItems.filter(i => i !== id); card.classList.remove('selected');
        } else {
            selectedItems.push(id); card.classList.add('selected');
        }
        document.getElementById('bulk-delete-btn').innerText = `Delete (${selectedItems.length})`;
    }

    async function deleteSelectedItems() {
        if(selectedItems.length === 0) return;
        if(!confirm(`Delete ${selectedItems.length} items?`)) return;
        const subsToDelete = selectedItems.filter(id => id.startsWith('sub-')).map(id => parseInt(id.split('-')[1])).sort((a,b)=>b-a);
        const mediaToDelete = selectedItems.filter(id => id.startsWith('media-')).map(id => parseInt(id.split('-')[1])).sort((a,b)=>b-a);

        subsToDelete.forEach(i => db.subs.splice(i, 1));
        for (let i of mediaToDelete) {
            const media = db.localMedia[i];
            await localforage.removeItem('media_' + media.id);
            db.localMedia.splice(i, 1);
        }
        save(); toggleLibraryEditMode(); renderLibrary();
    }

    // --- LOCAL EBOOK & PDF STORAGE ---
    async function openAndSaveLocalFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const id = Date.now().toString();
        const type = file.name.toLowerCase().endsWith('.pdf') ? 'pdf' : 'epub';
        
        await localforage.setItem('media_' + id, file);
        db.localMedia.push({ id, name: file.name, type, date: new Date().toISOString() });
        save();
        document.getElementById('library-filter').value = type;
        renderLibrary(); alert(`${file.name} added to Library!`);
    }

    async function loadSavedMedia(id, title, jumpTarget = null) {
        const file = await localforage.getItem('media_' + id);
        if(!file) return alert("File not found on device.");
        
        const modal = document.getElementById('media-modal');
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('open'), 10);
        
        document.getElementById('modal-title').innerText = title;
        modal.dataset.currentMediaId = id;
        modal.dataset.currentType = file.name.toLowerCase().endsWith('.pdf') ? 'pdf' : 'epub';
        modal.dataset.currentSource = title;
        
        document.getElementById('modal-audio-ui').style.display = 'none';
        document.getElementById('modal-article-ui').style.display = 'none';
        document.getElementById('modal-ebook-ui').style.display = 'none';
        document.getElementById('modal-pdf-ui').style.display = 'none';
        document.getElementById('toc-dropdown').style.display = 'none';

        if(file.name.toLowerCase().endsWith('.pdf')) {
            document.getElementById('modal-pdf-ui').style.display = 'block';
            document.getElementById('pdf-viewer').src = URL.createObjectURL(file);
        } else {
            document.getElementById('modal-ebook-ui').style.display = 'block';
            document.getElementById('epub-viewer').innerHTML = ''; 
            
            const reader = new FileReader();
            reader.onload = function(event) {
                epubBook = ePub(event.target.result);
                rendition = epubBook.renderTo("epub-viewer", { width: "100%", height: "100%", manager: "continuous", flow: "paginated" });
                
                if (jumpTarget) {
                    rendition.display(jumpTarget);
                } else {
                    rendition.display();
                }

                epubBook.loaded.navigation.then(function(toc){
                    let tocHtml = toc.map(chapter => `<div class="toc-item" onclick="rendition.display('${chapter.href}'); document.getElementById('toc-dropdown').style.display='none';">${chapter.label}</div>`).join('');
                    document.getElementById('toc-dropdown').innerHTML = tocHtml;
                });
                
                // Swipe to turn page
                let touchstartX = 0; let touchendX = 0;
                rendition.on('touchstart', ev => { touchstartX = ev.changedTouches[0].screenX; });
                rendition.on('touchend', ev => { 
                    touchendX = ev.changedTouches[0].screenX; 
                    if (touchendX < touchstartX - 50) rendition.next();
                    if (touchendX > touchstartX + 50) rendition.prev();
                });
                
                // Highlight interceptor inside iframe
                rendition.on("selected", (cfiRange) => {
                    const text = window.getSelection().toString() || "EPUB Highlight Saved";
                    const btn = document.getElementById('floating-highlight');
                    btn.style.display = 'block';
                    btn.dataset.cfi = cfiRange;
                    btn.dataset.text = text;
                });
            };
            reader.readAsArrayBuffer(file);
        }
    }

    function changeEpubFontSize(amount) {
        if(rendition) { epubFontSize += amount; rendition.themes.fontSize(epubFontSize + "%"); }
    }

    function setEpubBrightness(val) {
        document.getElementById('epub-viewer').style.filter = `brightness(${val}%)`;
    }

    // --- EXPLORE SEARCH & OPML ---
    function sanitizeFeedUrl(url) {
        if (!url) return null;
        if (url.includes('youtube.com/channel/')) return `https://www.youtube.com/feeds/videos.xml?channel_id=${url.split('channel/')[1].split('?')[0].split('/')[0]}`;
        if (url.includes('youtube.com/user/')) return `https://www.youtube.com/feeds/videos.xml?user=${url.split('user/')[1].split('?')[0].split('/')[0]}`;
        if (url.match(/reddit\.com\/r\/[a-zA-Z0-9_]+$/)) return url + '/.rss';
        if (url.match(/reddit\.com\/r\/[a-zA-Z0-9_]+\/?$/)) return url.replace(/\/$/, '') + '/.rss';
        return url;
    }

    function importOPML(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const parser = new DOMParser();
            const xml = parser.parseFromString(event.target.result, "text/xml");
            let count = 0;
            xml.querySelectorAll('outline').forEach(o => {
                let url = sanitizeFeedUrl(o.getAttribute('xmlUrl') || o.getAttribute('xmlurl') || o.getAttribute('url') || o.getAttribute('htmlUrl'));
                if(url && !db.subs.find(s => s.url === url)) {
                    db.subs.push({ title: o.getAttribute('title') || o.getAttribute('text') || "Feed", url }); count++;
                }
            });
            save(); alert(`Imported ${count} feeds!`); closeModal('settings-modal');
            if (document.getElementById('view-explore').classList.contains('active')) renderLibrary();
        };
        reader.readAsText(file);
    }

    async function searchExplore() {
        const q = document.getElementById('lib-search').value.trim();
        const type = document.getElementById('search-type').value;
        const resDiv = document.getElementById('search-results');
        if(!q) return; resDiv.innerHTML = "Searching...";

        try {
            resDiv.innerHTML = "";
            const proxyBase = "https://corsproxy.io/?"; 
            
            if (type === 'podcast') {
                const res = await fetch(`https://itunes.apple.com/search?media=podcast&term=${encodeURIComponent(q)}`);
                const data = await res.json();
                data.results.slice(0, 5).forEach(pod => {
                    resDiv.innerHTML += `<div class="glass-card" style="display:flex; justify-content:space-between; align-items:center; padding:15px;"><div><span class="item-title">${pod.collectionName}</span><span class="item-meta">Podcast</span></div><button class="text-btn" onclick="addSubscription('${pod.collectionName.replace(/'/g, "\\'")}', '${pod.feedUrl}')">Add</button></div>`;
                });
            } 
            else if (type === 'reddit') {
                const res = await fetch(proxyBase + encodeURIComponent(`https://www.reddit.com/subreddits/search.json?q=${encodeURIComponent(q)}`));
                const data = await res.json();
                if (data.data && data.data.children) {
                    data.data.children.slice(0, 5).forEach(child => {
                        const sub = child.data.display_name_prefixed;
                        resDiv.innerHTML += `<div class="glass-card" style="display:flex; justify-content:space-between; align-items:center; padding:15px;"><div><span class="item-title">${sub}</span><span class="item-meta">Subreddit</span></div><button class="text-btn" onclick="addSubscription('${sub}', 'https://www.reddit.com/${sub}/.rss')">Add</button></div>`;
                    });
                }
            } 
            else if (type === 'youtube') {
                const urlToFetch = q.startsWith("@") ? `https://www.youtube.com/${q}` : q;
                const res = await fetch(proxyBase + encodeURIComponent(urlToFetch));
                const html = await res.text();
                const match = html.match(/"externalId":"(UC[^"]+)"/) || html.match(/channel_id=([a-zA-Z0-9_-]+)/);
                if (match && match[1]) {
                    const titleMatch = html.match(/<title>(.*?) - YouTube<\/title>/);
                    const title = titleMatch ? titleMatch[1].replace(' - YouTube', '') : "YouTube Channel";
                    resDiv.innerHTML += `<div class="glass-card" style="display:flex; justify-content:space-between; align-items:center; padding:15px;"><div><span class="item-title">${title}</span><span class="item-meta">YouTube</span></div><button class="text-btn" onclick="addSubscription('${title.replace(/'/g, "\\'")}', 'https://www.youtube.com/feeds/videos.xml?channel_id=${match[1]}')">Add</button></div>`;
                } else { resDiv.innerHTML = "Could not locate YouTube ID. Paste exact channel URL."; }
            }
            if(resDiv.innerHTML === "") resDiv.innerHTML = "No results found.";
        } catch(e) { resDiv.innerHTML = "Search failed. Check connection."; }
    }

    // --- PRIORITIZED PROGRESSIVE FEED SYNC ---
    async function fetchDailyWiki() {
        const today = new Date().toISOString().split('T')[0];
        let cachedWiki = JSON.parse(localStorage.getItem('daily_wiki'));
        if (cachedWiki && cachedWiki.date === today) return cachedWiki.data;
        try {
            const res = await fetch('https://en.wikipedia.org/api/rest_v1/page/random/summary');
            const data = await res.json();
            const item = { title: data.title, link: data.content_urls.desktop.page, source: 'Wikipedia Daily', pubDate: new Date().toISOString(), type: 'article', content: data.extract_html, extractedImg: data.thumbnail ? data.thumbnail.source : null };
            localStorage.setItem('daily_wiki', JSON.stringify({date: today, data: item}));
            return item;
        } catch(e) { return null; }
    }

    async function refreshFeed(force = false) {
        const syncInd = document.getElementById('sync-indicator');
        if (db.feedCache && db.feedCache.length > 0) renderFeedItems();
        
        const now = Date.now();
        if (!force && db.lastSync && (now - db.lastSync < 1800000)) return; 
        
        syncInd.style.display = 'block';
        db.feedCache = []; 
        let backgroundCache = [];
        let completed = 0;
        const totalReqs = db.subs.length;

        fetchDailyWiki().then(wiki => { if(wiki) { db.feedCache.push(wiki); renderFeedItems(); } });
        if (totalReqs === 0) { syncInd.style.display = 'none'; return; }

        db.subs.forEach(async (sub) => {
            try {
                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(sub.url.trim())}`;
                const res = await fetch(proxyUrl);
                const textData = await res.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(textData, "text/xml");
                const entries = Array.from(xmlDoc.querySelectorAll("item, entry")).slice(0, 5); 
                
                entries.forEach((node, index) => {
                    const title = node.querySelector("title")?.textContent || "Untitled";
                    const linkNode = node.querySelector("link");
                    const link = linkNode ? (linkNode.textContent || linkNode.getAttribute("href")) : "";
                    const pubDateRaw = node.querySelector("pubDate, published, updated")?.textContent || new Date().toISOString();
                    
                    let content = node.getElementsByTagNameNS("*", "encoded").length > 0 ? node.getElementsByTagNameNS("*", "encoded")[0].textContent : (node.querySelector("description, content")?.textContent || "");
                    const enclosure = node.querySelector("enclosure");
                    const encUrl = enclosure ? enclosure.getAttribute("url") : null;
                    const encType = enclosure ? enclosure.getAttribute("type") : "";
                    const mediaThumb = node.querySelector("thumbnail")?.getAttribute("url") || node.querySelector("image")?.getAttribute("href");
                    
                    let extractedImg = mediaThumb || (encType.startsWith('image') ? encUrl : null);
                    if (!extractedImg) { const imgMatch = content.match(/<img[^>]+src="([^">]+)"/); if (imgMatch) extractedImg = imgMatch[1]; }

                    let type = 'article';
                    if (link.includes('youtube') || (encType && (encType.includes('audio') || encType.includes('video'))) || (encUrl && encUrl.match(/\.(mp3|m4a|wav|mp4)/i))) type = 'podcast';

                    const item = { title, link, pubDate: pubDateRaw, content, source: sub.title, extractedImg, type, enclosure: encUrl ? { link: encUrl } : null };

                    if (index === 0) {
                        db.feedCache.push(item);
                        db.feedCache.sort((a,b) => { let tA = new Date(a.pubDate).getTime(); let tB = new Date(b.pubDate).getTime(); if(isNaN(tA)) tA = 0; if(isNaN(tB)) tB = 0; return tB - tA; });
                        renderFeedItems();
                    } else { backgroundCache.push(item); }
                });
            } catch (e) {} 
            finally {
                completed++;
                if(completed === totalReqs) {
                    db.feedCache = db.feedCache.concat(backgroundCache);
                    db.feedCache.sort((a,b) => { let tA = new Date(a.pubDate).getTime(); let tB = new Date(b.pubDate).getTime(); if(isNaN(tA)) tA = 0; if(isNaN(tB)) tB = 0; return tB - tA; });
                    syncInd.style.display = 'none'; db.lastSync = Date.now(); save();
                } else { syncInd.innerText = `↻ Streaming posts... (${Math.round((completed/totalReqs)*100)}%)`; }
            }
        });
    }

    function filterFeed(type) { activeFeedFilter = type; displayLimit = db.settings.feedLimit; renderFeedItems(); }
    function loadMoreFeeds() { displayLimit += db.settings.feedLimit; renderFeedItems(); }

    function renderFeedItems() {
        const list = document.getElementById('feed-list');
        const filteredItems = activeFeedFilter === 'all' ? db.feedCache : db.feedCache.filter(i => i.type === activeFeedFilter);
        const itemsToRender = filteredItems.slice(0, displayLimit);
        
        let html = itemsToRender.map(item => {
            let parsedDate = new Date(item.pubDate);
            let dateStr = isNaN(parsedDate) ? "Recent" : parsedDate.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
            return `
            <div class="glass-card" onclick='openMediaModal(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
                <span class="item-meta">${item.source} • ${dateStr}</span>
                <span class="item-title">${item.title}</span>
                ${item.extractedImg ? `<img src="${item.extractedImg}" class="feed-img">` : ''}
            </div>`
        }).join('');

        if (filteredItems.length > displayLimit) html += `<button class="glass-card" style="width:100%; text-align:center; color:var(--accent); font-weight:bold; cursor:pointer;" onclick="loadMoreFeeds()">Load More ↓</button>`;
        else if (itemsToRender.length > 0) html += `<p style="text-align:center; color:var(--sub); margin-top:20px;">End of feed.</p>`;
        
        list.innerHTML = html;
    }

    // --- FULL ARTICLE EXTRACTOR ---
    async function openMediaModal(item) {
        const modal = document.getElementById('media-modal');
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('open'), 10);
        
        document.getElementById('modal-title').innerText = item.title;
        modal.dataset.currentType = item.type;
        modal.dataset.currentSource = item.source;
        modal.dataset.currentLink = item.link; // Store for jump-back
        
        const audioUI = document.getElementById('modal-audio-ui');
        const articleUI = document.getElementById('modal-article-ui');
        
        audioUI.style.display = 'none'; articleUI.style.display = 'none';
        document.getElementById('modal-ebook-ui').style.display = 'none'; document.getElementById('modal-pdf-ui').style.display = 'none';

        if(item.type === 'podcast') {
            audioUI.style.display = 'block';
            const audioEl = document.getElementById('main-audio');
            const videoEl = document.getElementById('main-video');
            audioEl.style.display = 'none'; videoEl.style.display = 'none';
            
            if (item.link && (item.link.includes('youtube.com') || item.link.includes('youtu.be'))) {
                let vidId = '';
                if(item.link.includes('v=')) vidId = item.link.split('v=')[1].split('&')[0];
                else if(item.link.includes('youtu.be/')) vidId = item.link.split('youtu.be/')[1].split('?')[0];
                if(vidId) { videoEl.src = `https://www.youtube.com/embed/${vidId}`; videoEl.style.display = 'block'; }
            } else {
                audioEl.src = item.enclosure ? item.enclosure.link : '';
                audioEl.style.display = 'block';
            }
            document.getElementById('transcript-container').innerHTML = item.content || item.description || "No description provided.";
        } 
        else if (item.type === 'article') {
            articleUI.style.display = 'block';
            const articleBody = document.getElementById('article-body');
            
            let contentHtml = item.content || item.description || "<p>No content provided by the feed.</p>";
            let topImg = item.extractedImg && !contentHtml.includes(item.extractedImg) ? `<img src="${item.extractedImg}" style="width:100%; max-height:300px; object-fit:cover; border-radius:12px; margin-bottom:15px;">` : '';
            
            articleBody.innerHTML = `${topImg}<div style="font-size:13px; color:var(--sub); text-align:center; margin-bottom:10px;">Extracting full text...</div>${contentHtml}`;

            try {
                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(item.link)}`;
                const response = await fetch(proxyUrl);
                const html = await response.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const reader = new Readability(doc);
                const article = reader.parse();
                
                if(article && article.textContent.length > 300) articleBody.innerHTML = topImg + article.content;
                else throw new Error("Extracted text too short.");
            } catch(e) {
                articleBody.innerHTML = `
                    ${topImg}
                    <div style="font-size:13px; color:#FF3B30; text-align:center; margin-bottom:10px;">Full text extraction blocked by publisher.</div>
                    ${contentHtml}
                    <div style="margin-top: 30px; text-align: center;"><button class="glass-card" style="width:100%; color:var(--accent); font-weight:bold; border: 1px solid var(--accent); cursor:pointer;" onclick="window.open('${item.link}', '_blank')">Read Original Webpage</button></div>
                `;
            }
        }
    }

    // --- HIGHLIGHTING & INBOX (WITH DEEP LINKS) ---
    document.addEventListener('selectionchange', () => {
        const text = window.getSelection().toString().trim();
        const btn = document.getElementById('floating-highlight');
        if (text.length > 0 && document.getElementById('media-modal').classList.contains('open')) {
            btn.style.display = 'block';
            // Ebook CFI handled inside the epub renderer
            if(!btn.dataset.cfi) btn.dataset.text = text;
        } else { 
            btn.style.display = 'none'; 
            btn.dataset.cfi = "";
        }
    });

    function saveSelectedText(event) {
        event.preventDefault(); 
        const btn = document.getElementById('floating-highlight');
        const modal = document.getElementById('media-modal');
        const text = btn.dataset.text || window.getSelection().toString().trim();
        
        if(text) {
            const source = document.getElementById('modal-title').innerText;
            const type = modal.dataset.currentType;
            let target = "";
            
            if (type === 'epub') target = btn.dataset.cfi;
            else if (type === 'article') target = modal.dataset.currentLink;
            
            saveNote(text, source, type, target, modal.dataset.currentMediaId);
            window.getSelection().removeAllRanges();
            btn.style.display = 'none';
        }
    }

    function snipAudio() {
        const modal = document.getElementById('media-modal');
        const audio = document.getElementById('main-audio');
        const video = document.getElementById('main-video');
        let prefix = ""; let target = "";
        
        if (audio.style.display === 'block' && audio.src) {
            prefix = `[${Math.floor(audio.currentTime)}s] `;
            target = Math.floor(audio.currentTime);
        } else if (video.style.display === 'block') {
            prefix = `[YouTube Note] `;
            target = modal.dataset.currentLink;
        }
        
        const thought = prompt("Enter your note for this media:");
        if(thought) saveNote(`${prefix}${thought}`, document.getElementById('modal-title').innerText, 'podcast', target);
    }

    function saveNote(text, source, type, linkTarget, mediaId = null) {
        db.notes.push({ 
            id: Date.now().toString(), text, source, type, linkTarget, mediaId, thoughts: "", 
            date: new Date().toISOString(), reviewCount: 0, interval: 1, ease: 2.5, nextReview: Date.now(), history: [] 
        });
        save(); alert("Saved to Inbox!"); renderInbox();
    }

    function renderInbox() {
        const list = document.getElementById('inbox-list');
        list.innerHTML = db.notes.length ? db.notes.sort((a,b) => b.id - a.id).map(n => `
            <div class="glass-card" style="cursor:default;">
                <button class="jump-btn" onclick="jumpToSource('${n.id}')">↗ Source</button>
                <span class="item-meta">${n.source}</span>
                <span class="item-title" style="font-size:16px;">${n.text}</span>
                <div class="user-note" onclick="editThought('${n.id}')">
                    ${n.thoughts ? `<strong>📝 Notes:</strong><br>${n.thoughts}` : `<span style="color:var(--sub)">📝 Tap to add notes...</span>`}
                </div>
                <div style="font-size:12px; color:var(--sub); margin-top:10px;">
                    <span class="material-symbols-outlined" style="font-size:14px; vertical-align:middle;">psychology</span> Seen: ${n.reviewCount || 0} times
                </div>
            </div>
        `).join('') : '<p style="text-align:center; color:var(--sub); margin-top: 40px;">Inbox empty.</p>';
    }

    function jumpToSource(id) {
        const note = db.notes.find(n => n.id === id);
        if(!note) return;
        
        if(note.type === 'epub') {
            if(note.mediaId && note.linkTarget) loadSavedMedia(note.mediaId, note.source, note.linkTarget);
            else alert("Cannot locate original Ebook.");
        } 
        else if (note.type === 'article') {
            if(note.linkTarget) window.open(note.linkTarget, '_blank');
            else alert("No URL saved for this article.");
        }
        else if (note.type === 'podcast') {
            // Find item in cache and open modal, then skip time (simplified jump for audio)
            alert(`This note was taken at ${note.linkTarget} seconds. Please open the podcast from your feed.`);
        }
    }

    function editThought(id) {
        const note = db.notes.find(n => n.id === id);
        const newThoughts = prompt("Add or edit your thoughts:", note.thoughts || "");
        if (newThoughts !== null) { note.thoughts = newThoughts; save(); renderInbox(); }
    }

    // --- ENHANCED SRS ENGINE ---
    function startSRS() {
        const now = Date.now();
        srsQueue = db.notes.filter(n => n.nextReview <= now);
        if(srsQueue.length === 0) return alert("You are all caught up for today!");
        
        const modal = document.getElementById('srs-modal');
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('open'), 10);
        showNextSRS();
    }

    function showNextSRS() {
        const body = document.getElementById('srs-body');
        if(srsQueue.length === 0) {
            body.innerHTML = `<h3 style="text-align:center; margin-top:50px;">Review Complete! 🎉</h3>`;
            setTimeout(() => closeModal('srs-modal'), 1500); renderInbox(); return;
        }

        const note = srsQueue[0];
        const mode = db.settings.srsMode;
        
        let btnsHTML = mode === 2 ? `
            <button style="background:#FF3B30;" onclick="processSRS('hard')">Hard</button>
            <button style="background:#007AFF;" onclick="processSRS('easy')">Easy</button>
        ` : `
            <button style="background:#FF3B30;" onclick="processSRS('hard')">Hard</button>
            <button style="background:#34C759;" onclick="processSRS('good')">Good</button>
            <button style="background:#007AFF;" onclick="processSRS('easy')">Easy</button>
        `;

        body.innerHTML = `
            <div class="glass-card">
                <span class="item-meta" style="color:var(--accent);">${note.source}</span>
                <span class="item-title" style="font-size:18px;">${note.text}</span>
                ${note.thoughts ? `<div class="user-note">${note.thoughts}</div>` : ''}
                ${note.history && note.history.length > 0 ? `<div style="font-size:11px; color:var(--sub); margin-top:15px; border-top:1px solid var(--border); padding-top:10px;"><strong>Last Review:</strong> ${new Date(note.history[note.history.length-1].date).toLocaleDateString()} (Grade: ${note.history[note.history.length-1].grade})</div>` : ''}
            </div>
            <p style="text-align:center; margin-top:20px; color:var(--sub);">How well did you remember this?</p>
            <div class="srs-btns">${btnsHTML}</div>
            <p style="text-align:center; margin-top:20px; color:var(--sub); font-size:13px;">${srsQueue.length} remaining</p>
        `;
    }

    function processSRS(grade) {
        let note = srsQueue.shift();
        let idx = db.notes.findIndex(n => n.id === note.id);
        if(!note.history) note.history = [];
        
        if (grade === 'hard') { note.interval = 1; note.ease = Math.max(1.3, note.ease - 0.2); }
        else if (grade === 'good') { note.interval = Math.max(1, Math.round(note.interval * note.ease)); }
        else if (grade === 'easy') { note.ease += 0.15; note.interval = Math.max(1, Math.round(note.interval * note.ease * 1.3)); }
        
        note.history.push({ date: new Date().toISOString(), grade: grade, interval: note.interval, ease: note.ease });
        note.nextReview = Date.now() + (note.interval * 24 * 60 * 60 * 1000);
        note.reviewCount = (note.reviewCount || 0) + 1;
        
        db.notes[idx] = note; save(); showNextSRS();
    }

    switchTab('inbox');
</script>
