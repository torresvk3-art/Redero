<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Recall — Media Hub</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.88/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <style>
        /* --- THEMES --- */
        :root { /* Apple Light */
            --bg: #F2F2F7; --surface: #FFFFFF; --text: #1C1C1E; --sub: #8E8E93; --accent: #007AFF; --border: #E5E5EA;
        }
        html.theme-black { /* Pure Black */
            --bg: #000000; --surface: #1C1C1E; --text: #FFFFFF; --sub: #8E8E93; --accent: #0A84FF; --border: #38383A;
        }
        html.theme-catppuccin { /* Catppuccin Mocha */
            --bg: #1e1e2e; --surface: #313244; --text: #cdd6f4; --sub: #a6adc8; --accent: #89b4fa; --border: #45475a;
        }
        html.theme-gruvbox { /* Gruvbox Dark */
            --bg: #282828; --surface: #3c3836; --text: #ebdbb2; --sub: #928374; --accent: #fe8019; --border: #504945;
        }
        html.theme-solarized { /* Solarized Dark */
            --bg: #002b36; --surface: #073642; --text: #839496; --sub: #586e75; --accent: #268bd2; --border: #073642;
        }

        html { background-color: var(--bg); transition: background-color 0.2s; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px;
            transition: all 0.2s ease; -webkit-font-smoothing: antialiased; min-height: 100dvh;
        }

        header {
            padding: 60px 25px 20px 25px; position: sticky; top: 0; z-index: 10;
            background: color-mix(in srgb, var(--bg) 80%, transparent); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        header h1 { font-size: 34px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .header-btns { display: flex; gap: 12px; }
        .icon-btn { background: none; border: none; color: var(--accent); cursor: pointer; padding: 0; display:flex; align-items:center; justify-content:center; }

        .container { padding: 20px; }

        /* --- LIQUID GLASS CARDS --- */
        .glass-card {
            background: color-mix(in srgb, var(--surface) 60%, transparent);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid color-mix(in srgb, var(--text) 10%, transparent);
            border-radius: 20px; padding: 20px; margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05); transition: transform 0.1s;
        }
        .item-title { font-size: 19px; font-weight: 700; margin-bottom: 8px; display: block; line-height: 1.3; }
        .item-meta { font-size: 13px; color: var(--sub); display: block; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 6px;}
        .feed-img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 12px; margin-top: 12px; border: 1px solid var(--border); }
        .inbox-img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; float: right; margin-left: 10px; border: 1px solid var(--border); }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: color-mix(in srgb, var(--surface) 85%, transparent); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; border-top: 1px solid var(--border);
            padding-bottom: max(12px, env(safe-area-inset-bottom)); padding-top: 12px; z-index: 50;
        }
        nav button { background: none; border: none; color: var(--sub); font-size: 11px; font-weight: 500; display:flex; flex-direction:column; align-items:center; gap:4px; }
        nav button.active { color: var(--accent); }

        /* --- EXPLORE UI --- */
        .search-bar {
            background: var(--surface); border-radius: 12px; padding: 8px 15px; margin-bottom: 20px;
            display: flex; align-items: center; border: 1px solid var(--border);
        }
        .search-bar select, .dropdown-select { background: none; border: none; color: var(--accent); font-weight: 600; outline: none; font-size: 15px; }
        .search-bar select { margin-right: 10px; }
        input { background: none; border: none; color: var(--text); width: 100%; outline: none; font-size: 16px; padding: 10px 0; }
        .text-btn { background: none; border: none; color: var(--accent); font-size: 16px; font-weight: 600; cursor: pointer; padding:0;}

        .view { display: none; } .view.active { display: block; }

        /* --- MODALS (Reader & SRS) --- */
        .fullscreen-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100dvh;
            background: var(--bg); z-index: 1000; display: none; flex-direction: column;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .fullscreen-modal.open { transform: translateY(0); }
        .modal-header {
            padding: max(20px, env(safe-area-inset-top)) 20px 15px 20px;
            background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1001;
        }
        .modal-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; -webkit-user-select: text; user-select: text; }
        
        #epub-viewer { width: 100%; height: 70vh; background: var(--surface); border-radius: 12px; margin: 10px 0; overflow: hidden; }
        #article-body, #transcript-container { font-size: 18px; line-height: 1.6; color: var(--text); padding: 15px; background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow-wrap: break-word;}
        
        #article-body img, #article-body figure, #article-body iframe { max-width: 100%; height: auto; border-radius: 10px; margin: 15px 0; display: block; }
        #pdf-viewer { width: 100%; height: 80vh; border: none; border-radius: 12px; }

        .srs-btns { display: flex; gap: 10px; margin-top: 20px; }
        .srs-btns button { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; color: white; }

        #floating-highlight {
            display: none; position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: white; padding: 14px 28px; border-radius: 30px;
            font-weight: 700; font-size: 16px; border: none; box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 1002;
        }

        .user-note {
            margin-top: 12px; padding: 12px; background: color-mix(in srgb, var(--bg) 50%, transparent);
            border-radius: 10px; border-left: 3px solid var(--accent); font-size: 15px; color: var(--text);
        }
        
        #sync-indicator { text-align:center; color:var(--accent); font-weight: bold; font-size:13px; padding-bottom:10px; display:none; }
    </style>
</head>
<body>

<header>
    <h1 id="title">Inbox</h1>
    <div class="header-btns">
        <button class="icon-btn" onclick="cycleTheme()"><span class="material-symbols-outlined">dark_mode</span></button>
        <button class="icon-btn" onclick="startSRS()"><span class="material-symbols-outlined">psychology</span></button>
    </div>
</header>

<div class="container">
    <!-- FEED TAB -->
    <div id="view-feed" class="view">
        <div id="filter-bar" style="margin-bottom:15px; display:flex; gap:15px; overflow-x:auto; padding-bottom:10px; align-items: center;">
            <button class="text-btn" onclick="filterFeed('all')">All</button>
            <button class="text-btn" onclick="filterFeed('podcast')">Media</button>
            <button class="text-btn" onclick="filterFeed('article')">Articles</button>
            
            <select class="dropdown-select" style="margin-left:auto; margin-right:10px;" id="feed-limit-select" onchange="updateFeedLimit(this.value)">
                <option value="10">10 / Page</option>
                <option value="15" selected>15 / Page</option>
                <option value="25">25 / Page</option>
            </select>
            
            <!-- Manual Sync Button -->
            <button class="icon-btn" onclick="refreshFeed(true)"><span class="material-symbols-outlined">sync</span></button>
        </div>
        <div id="sync-indicator">↻ Syncing latest posts...</div>
        <div id="feed-list"></div>
    </div>

    <!-- EXPLORE TAB -->
    <div id="view-explore" class="view">
        <div class="search-bar">
            <select id="search-type">
                <option value="podcast">Podcasts</option>
                <option value="reddit">Reddit</option>
                <option value="youtube">YouTube</option>
            </select>
            <input type="text" id="lib-search" placeholder="Search or paste channel...">
            <button class="text-btn" onclick="searchExplore()">Find</button>
        </div>
        <div id="search-results"></div>
        
        <h3 style="margin-top: 30px;">Subscriptions</h3>
        <div id="sub-list"></div>
        
        <div style="margin-top:20px; display:flex; flex-direction:column; gap:15px; border-top: 1px solid var(--border); padding-top: 20px;">
            <input type="file" id="opml-in" style="display:none" onchange="importOPML(event)">
            <button class="glass-card" style="margin:0; padding:15px; text-align:left;" onclick="document.getElementById('opml-in').click()">
                <span style="font-weight:700; color:var(--accent);">📁 Import OPML Backup</span>
            </button>
            
            <input type="file" id="file-in" style="display:none" onchange="openLocalFile(event)">
            <button class="glass-card" style="margin:0; padding:15px; text-align:left;" onclick="document.getElementById('file-in').click()">
                <span style="font-weight:700; color:var(--accent);">📖 Open Ebook or PDF</span>
            </button>
        </div>
    </div>

    <!-- INBOX TAB -->
    <div id="view-inbox" class="view active">
        <div id="inbox-list"></div>
    </div>
</div>

<!-- MEDIA READER OVERLAY -->
<div id="media-modal" class="fullscreen-modal" data-current-img="">
    <div class="modal-header">
        <h3 id="modal-title" style="margin:0; font-size: 18px; max-width: 70%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Reader</h3>
        <button class="icon-btn" onclick="closeModal('media-modal')"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="modal-content" id="modal-body">
        
        <div id="modal-audio-ui" style="display:none;">
            <iframe id="main-video" style="width:100%; aspect-ratio:16/9; border-radius:12px; border:none; margin-bottom:15px; display:none;" allowfullscreen></iframe>
            <audio id="main-audio" controls style="width:100%; margin-bottom:15px; display:none;"></audio>
            
            <button class="text-btn" style="width:100%; background:var(--accent); color:white; padding:12px; border-radius:12px; margin-bottom:15px;" onclick="snipAudio()">✂️ Snip Moment to Inbox</button>
            <h4 style="margin-top:20px;">Description / Transcript</h4>
            <div id="transcript-container"></div>
        </div>

        <div id="modal-article-ui" style="display:none;"><div id="article-body"></div></div>
        
        <div id="modal-ebook-ui" style="display:none;">
            <div id="epub-viewer"></div>
            <div style="display:flex; justify-content: space-between; padding: 15px 0;">
                <button class="text-btn" onclick="rendition.prev()">← Prev</button>
                <button class="text-btn" onclick="rendition.next()">Next →</button>
            </div>
        </div>
        
        <div id="modal-pdf-ui" style="display:none;"><iframe id="pdf-viewer"></iframe></div>
    </div>
    <button id="floating-highlight" onmousedown="saveSelectedText(event)">📝 Save Highlight</button>
</div>

<!-- SRS REVIEW OVERLAY -->
<div id="srs-modal" class="fullscreen-modal">
    <div class="modal-header">
        <h3 style="margin:0; font-size: 18px;">Daily Review</h3>
        <button class="icon-btn" onclick="closeModal('srs-modal')"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="modal-content" id="srs-body"></div>
</div>

<nav>
    <button onclick="switchTab('feed')" id="nav-feed"><span class="material-symbols-outlined">rss_feed</span>Feed</button>
    <button onclick="switchTab('explore')" id="nav-explore"><span class="material-symbols-outlined">explore</span>Explore</button>
    <button onclick="switchTab('inbox')" id="nav-inbox" class="active"><span class="material-symbols-outlined">inbox</span>Inbox</button>
</nav>

<script>
    // --- DATABASE MIGRATION ---
    function initDB() {
        let currentDB = JSON.parse(localStorage.getItem('recall_v3_db'));
        if (!currentDB || !currentDB.notes) {
            currentDB = { subs: [], notes: [], feedCache: [], lastSync: 0 };
            const oldKeys = ['things_recall_db', 'omni_db', 'rss_highlights', 'rss_feeds'];
            oldKeys.forEach(key => {
                const oldData = JSON.parse(localStorage.getItem(key));
                if (oldData) {
                    if (oldData.notes) currentDB.notes.push(...oldData.notes);
                    if (oldData.subscriptions) currentDB.subs.push(...oldData.subscriptions);
                    if (oldData.highlights) currentDB.notes.push(...oldData.highlights);
                }
            });
            currentDB.notes = currentDB.notes.filter((note, index, self) => index === self.findIndex((t) => (t.id === note.id || t.text === note.text)));
            localStorage.setItem('recall_v3_db', JSON.stringify(currentDB));
        }
        return currentDB;
    }
    
    let db = initDB();
    let themes = ['light', 'black', 'catppuccin', 'gruvbox', 'solarized'];
    let currentThemeIdx = 0;
    let rendition = null;
    let srsQueue = [];
    
    let activeFeedFilter = 'all';
    let ITEMS_PER_PAGE = parseInt(localStorage.getItem('feed_limit')) || 15;
    let displayLimit = ITEMS_PER_PAGE;
    document.getElementById('feed-limit-select').value = ITEMS_PER_PAGE;

    if (localStorage.getItem('saved_theme')) {
        document.documentElement.className = 'theme-' + localStorage.getItem('saved_theme');
        currentThemeIdx = themes.indexOf(localStorage.getItem('saved_theme'));
    }

    function switchTab(tab) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('active');
        document.getElementById('nav-' + tab).classList.add('active');
        
        let titleMap = { feed: "Feed", explore: "Explore", inbox: "Inbox" };
        document.getElementById('title').innerText = titleMap[tab];
        
        if(tab === 'feed') refreshFeed(false);
        if(tab === 'inbox') renderInbox();
        if(tab === 'explore') renderLibrary();
    }

    function cycleTheme() {
        currentThemeIdx = (currentThemeIdx + 1) % themes.length;
        document.documentElement.className = 'theme-' + themes[currentThemeIdx];
        localStorage.setItem('saved_theme', themes[currentThemeIdx]);
    }

    function save() { localStorage.setItem('recall_v3_db', JSON.stringify(db)); }

    // --- EXPLORE & SUBSCRIPTIONS ---
    function renderLibrary() {
        const list = document.getElementById('sub-list');
        list.innerHTML = db.subs.map((s, i) => `
            <div class="glass-card" style="display:flex; justify-content:space-between; align-items:center; padding: 12px 16px;">
                <span style="font-weight: 600;">${s.title}</span>
                <button class="text-btn" style="color: #FF3B30;" onclick="removeSub(${i})">Delete</button>
            </div>
        `).join('');
    }

    function removeSub(i) { db.subs.splice(i, 1); save(); renderLibrary(); }

    function addSubscription(title, url) {
        if(!db.subs.find(s => s.url === url)) {
            db.subs.push({ title, url }); save(); renderLibrary();
            document.getElementById('search-results').innerHTML = `<p style="color:var(--accent); font-weight:bold;">Added ${title}!</p>`;
        }
    }

    // Smart OPML URL Sanitizer
    function sanitizeFeedUrl(url) {
        if (!url) return null;
        if (url.includes('youtube.com/channel/')) {
            const id = url.split('channel/')[1].split('?')[0].split('/')[0];
            return `https://www.youtube.com/feeds/videos.xml?channel_id=${id}`;
        }
        if (url.includes('youtube.com/user/')) {
            const user = url.split('user/')[1].split('?')[0].split('/')[0];
            return `https://www.youtube.com/feeds/videos.xml?user=${user}`;
        }
        if (url.match(/reddit\.com\/r\/[a-zA-Z0-9_]+$/)) return url + '/.rss';
        if (url.match(/reddit\.com\/r\/[a-zA-Z0-9_]+\/?$/)) return url.replace(/\/$/, '') + '/.rss';
        return url;
    }

    function importOPML(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const parser = new DOMParser();
            const xml = parser.parseFromString(event.target.result, "text/xml");
            let count = 0;
            xml.querySelectorAll('outline').forEach(o => {
                let url = o.getAttribute('xmlUrl') || o.getAttribute('xmlurl') || o.getAttribute('url') || o.getAttribute('htmlUrl');
                url = sanitizeFeedUrl(url);
                if(url && !db.subs.find(s => s.url === url)) {
                    db.subs.push({ title: o.getAttribute('title') || o.getAttribute('text') || "Feed", url });
                    count++;
                }
            });
            save(); alert(`Successfully imported ${count} feeds!`); renderLibrary(); refreshFeed(true);
        };
        reader.readAsText(file);
    }

    async function searchExplore() {
        const q = document.getElementById('lib-search').value.trim();
        const type = document.getElementById('search-type').value;
        const resDiv = document.getElementById('search-results');
        if(!q) return;
        resDiv.innerHTML = "Searching...";

        try {
            resDiv.innerHTML = "";
            const proxyBase = "https://api.allorigins.win/get?url=";
            
            if (type === 'podcast') {
                const res = await fetch(`https://itunes.apple.com/search?media=podcast&term=${encodeURIComponent(q)}`);
                const data = await res.json();
                data.results.slice(0, 5).forEach(pod => {
                    resDiv.innerHTML += `
                        <div class="glass-card" style="display:flex; justify-content:space-between; align-items:center; padding:15px;">
                            <div><span class="item-title">${pod.collectionName}</span><span class="item-meta">Podcast</span></div>
                            <button class="text-btn" onclick="addSubscription('${pod.collectionName.replace(/'/g, "\\'")}', '${pod.feedUrl}')">Add</button>
                        </div>`;
                });
            } 
            else if (type === 'reddit') {
                const res = await fetch(proxyBase + encodeURIComponent(`https://www.reddit.com/subreddits/search.json?q=${encodeURIComponent(q)}`));
                const jsonRaw = await res.json();
                const data = JSON.parse(jsonRaw.contents);
                if (data.data && data.data.children) {
                    data.data.children.slice(0, 5).forEach(child => {
                        const sub = child.data.display_name_prefixed;
                        resDiv.innerHTML += `
                            <div class="glass-card" style="display:flex; justify-content:space-between; align-items:center; padding:15px;">
                                <div><span class="item-title">${sub}</span><span class="item-meta">Subreddit</span></div>
                                <button class="text-btn" onclick="addSubscription('${sub}', 'https://www.reddit.com/${sub}/.rss')">Add</button>
                            </div>`;
                    });
                }
            } 
            else if (type === 'youtube') {
                resDiv.innerHTML = "Resolving YouTube Channel...";
                const urlToFetch = q.startsWith("@") ? `https://www.youtube.com/${q}` : q;
                const res = await fetch(proxyBase + encodeURIComponent(urlToFetch));
                const jsonRaw = await res.json();
                const html = jsonRaw.contents;
                
                const match = html.match(/"externalId":"(UC[^"]+)"/) || html.match(/channel_id=([a-zA-Z0-9_-]+)/);
                if (match && match[1]) {
                    const titleMatch = html.match(/<title>(.*?) - YouTube<\/title>/);
                    const title = titleMatch ? titleMatch[1].replace(' - YouTube', '') : "YouTube Channel";
                    resDiv.innerHTML += `
                        <div class="glass-card" style="display:flex; justify-content:space-between; align-items:center; padding:15px;">
                            <div><span class="item-title">${title}</span><span class="item-meta">YouTube</span></div>
                            <button class="text-btn" onclick="addSubscription('${title.replace(/'/g, "\\'")}', 'https://www.youtube.com/feeds/videos.xml?channel_id=${match[1]}')">Add</button>
                        </div>`;
                } else {
                    resDiv.innerHTML = "Could not locate YouTube ID. Paste exact channel URL.";
                }
            }
            if(resDiv.innerHTML === "") resDiv.innerHTML = "No results found.";
        } catch(e) { resDiv.innerHTML = "Search failed. Check connection."; }
    }

    // --- FEED LOGIC (CACHED & BATCHED) ---
    function updateFeedLimit(val) {
        ITEMS_PER_PAGE = parseInt(val);
        localStorage.setItem('feed_limit', ITEMS_PER_PAGE);
        displayLimit = ITEMS_PER_PAGE;
        renderFeedItems();
    }

    async function fetchDailyWiki() {
        const today = new Date().toISOString().split('T')[0];
        let cachedWiki = JSON.parse(localStorage.getItem('daily_wiki'));
        
        if (cachedWiki && cachedWiki.date === today) {
            return cachedWiki.data;
        }
        
        try {
            const res = await fetch('https://en.wikipedia.org/api/rest_v1/page/random/summary');
            const data = await res.json();
            const item = { 
                title: data.title, link: data.content_urls.desktop.page, 
                source: 'Wikipedia Daily', pubDate: new Date().toISOString(), type: 'article',
                content: data.extract_html, extractedImg: data.thumbnail ? data.thumbnail.source : null
            };
            localStorage.setItem('daily_wiki', JSON.stringify({date: today, data: item}));
            return item;
        } catch(e) { return null; }
    }

    async function refreshFeed(force = false) {
        const syncInd = document.getElementById('sync-indicator');
        
        // 1. Render Cache Instantly
        if (db.feedCache && db.feedCache.length > 0) {
            renderFeedItems();
        }
        
        // 2. Prevent spam syncing. Only sync if forced or if older than 30 mins
        const now = Date.now();
        if (!force && db.lastSync && (now - db.lastSync < 1800000)) {
            return; 
        }
        
        syncInd.style.display = 'block';
        
        let newItems = [];
        const wiki = await fetchDailyWiki();
        if(wiki) newItems.push(wiki);

        // Fetch in safe batches of 5 to prevent proxy bans
        const BATCH_SIZE = 5;
        let completed = 0;
        
        for (let i = 0; i < db.subs.length; i += BATCH_SIZE) {
            const batch = db.subs.slice(i, i + BATCH_SIZE);
            const promises = batch.map(async (sub) => {
                try {
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(sub.url.trim())}`;
                    const res = await fetch(proxyUrl);
                    const data = await res.json();
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                    
                    const entries = Array.from(xmlDoc.querySelectorAll("item, entry")).slice(0, 8);
                    
                    return entries.map(node => {
                        const title = node.querySelector("title")?.textContent || "Untitled";
                        const linkNode = node.querySelector("link");
                        const link = linkNode ? (linkNode.textContent || linkNode.getAttribute("href")) : "";
                        const pubDateRaw = node.querySelector("pubDate, published, updated")?.textContent || new Date().toISOString();
                        
                        let content = node.getElementsByTagNameNS("*", "encoded").length > 0 ? 
                                      node.getElementsByTagNameNS("*", "encoded")[0].textContent : 
                                      (node.querySelector("description, content")?.textContent || "");

                        const enclosure = node.querySelector("enclosure");
                        const encUrl = enclosure ? enclosure.getAttribute("url") : null;
                        const encType = enclosure ? enclosure.getAttribute("type") : "";

                        const mediaThumb = node.querySelector("thumbnail")?.getAttribute("url") || node.querySelector("image")?.getAttribute("href");
                        let extractedImg = mediaThumb || (encType.startsWith('image') ? encUrl : null);
                        if (!extractedImg) {
                            const imgMatch = content.match(/<img[^>]+src="([^">]+)"/);
                            if (imgMatch) extractedImg = imgMatch[1];
                        }

                        let type = 'article';
                        if (link.includes('youtube') || 
                            (encType && (encType.includes('audio') || encType.includes('video'))) || 
                            (encUrl && encUrl.match(/\.(mp3|m4a|wav|mp4)/i))) {
                            type = 'podcast';
                        }

                        return {
                            title, link, pubDate: pubDateRaw, content, source: sub.title,
                            extractedImg, type, enclosure: encUrl ? { link: encUrl } : null
                        };
                    });
                } catch (e) {
                    return []; // Fail silently for this feed
                }
            });

            const batchResults = await Promise.all(promises);
            newItems.push(...batchResults.flat());
            
            completed += batch.length;
            syncInd.innerText = `↻ Syncing latest posts... (${Math.round((completed/db.subs.length)*100)}%)`;
        }

        // Sort properly
        db.feedCache = newItems.sort((a,b) => {
            let tA = new Date(a.pubDate).getTime();
            let tB = new Date(b.pubDate).getTime();
            if(isNaN(tA)) tA = 0; if(isNaN(tB)) tB = 0;
            return tB - tA;
        });
        
        db.lastSync = Date.now();
        save();
        
        syncInd.style.display = 'none';
        displayLimit = ITEMS_PER_PAGE;
        renderFeedItems();
    }

    function filterFeed(type) {
        activeFeedFilter = type;
        displayLimit = ITEMS_PER_PAGE;
        renderFeedItems();
    }

    function loadMoreFeeds() {
        displayLimit += ITEMS_PER_PAGE;
        renderFeedItems();
    }

    function renderFeedItems() {
        const list = document.getElementById('feed-list');
        const filteredItems = activeFeedFilter === 'all' ? db.feedCache : db.feedCache.filter(i => i.type === activeFeedFilter);
        const itemsToRender = filteredItems.slice(0, displayLimit);
        
        let html = itemsToRender.map(item => {
            let parsedDate = new Date(item.pubDate);
            let dateStr = isNaN(parsedDate) ? "Recent" : parsedDate.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
            return `
            <div class="glass-card" onclick='openMediaModal(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
                <span class="item-meta">${item.source} • ${dateStr}</span>
                <span class="item-title">${item.title}</span>
                ${item.extractedImg ? `<img src="${item.extractedImg}" class="feed-img">` : ''}
            </div>`
        }).join('');

        if (filteredItems.length > displayLimit) {
            html += `<button class="glass-card" style="width:100%; text-align:center; color:var(--accent); font-weight:bold; cursor:pointer;" onclick="loadMoreFeeds()">Load More ↓</button>`;
        }
        list.innerHTML = html;
    }

    // --- MODALS & READER ---
    function closeModal(id) {
        const m = document.getElementById(id);
        m.classList.remove('open');
        if(id === 'media-modal') {
            document.getElementById('main-audio').pause();
            document.getElementById('main-video').src = '';
        }
        setTimeout(() => { m.style.display = 'none'; }, 300);
    }

    function openMediaModal(item) {
        const modal = document.getElementById('media-modal');
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('open'), 10);
        
        document.getElementById('modal-title').innerText = item.title;
        modal.dataset.currentImg = item.extractedImg || '';

        const audioUI = document.getElementById('modal-audio-ui');
        const audioEl = document.getElementById('main-audio');
        const videoEl = document.getElementById('main-video');
        const articleUI = document.getElementById('modal-article-ui');
        
        audioUI.style.display = 'none';
        articleUI.style.display = 'none';
        document.getElementById('modal-ebook-ui').style.display = 'none';
        document.getElementById('modal-pdf-ui').style.display = 'none';

        if(item.type === 'podcast') {
            audioUI.style.display = 'block';
            audioEl.style.display = 'none';
            videoEl.style.display = 'none';
            
            if (item.link && (item.link.includes('youtube.com') || item.link.includes('youtu.be'))) {
                let vidId = '';
                if(item.link.includes('v=')) vidId = item.link.split('v=')[1].split('&')[0];
                else if(item.link.includes('youtu.be/')) vidId = item.link.split('youtu.be/')[1].split('?')[0];
                
                if(vidId) {
                    videoEl.src = `https://www.youtube.com/embed/${vidId}`;
                    videoEl.style.display = 'block';
                }
            } else {
                audioEl.src = item.enclosure ? item.enclosure.link : '';
                audioEl.style.display = 'block';
            }
            
            document.getElementById('transcript-container').innerHTML = item.content || item.description || "No description provided.";
        } 
        else if (item.type === 'article') {
            articleUI.style.display = 'block';
            let contentHtml = item.content || item.description || "<p>No content provided by the feed.</p>";
            let topImg = item.extractedImg && !contentHtml.includes(item.extractedImg) ? 
                         `<img src="${item.extractedImg}" style="width:100%; max-height:300px; object-fit:cover; border-radius:12px; margin-bottom:15px;">` : '';
            
            document.getElementById('article-body').innerHTML = `
                ${topImg}
                ${contentHtml}
                <div style="margin-top: 30px; text-align: center;">
                    <button class="glass-card" style="width:100%; color:var(--accent); font-weight:bold; border: 1px solid var(--accent); cursor:pointer;" onclick="window.open('${item.link}', '_blank')">
                        Read Original Webpage
                    </button>
                </div>
            `;
        }
    }

    function openLocalFile(e) {
        const file = e.target.files[0];
        if (!file) return;

        const modal = document.getElementById('media-modal');
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('open'), 10);
        document.getElementById('modal-title').innerText = file.name;
        modal.dataset.currentImg = "";
        
        document.getElementById('modal-audio-ui').style.display = 'none';
        document.getElementById('modal-article-ui').style.display = 'none';
        document.getElementById('modal-ebook-ui').style.display = 'none';
        document.getElementById('modal-pdf-ui').style.display = 'none';

        if(file.name.toLowerCase().endsWith('.pdf')) {
            document.getElementById('modal-pdf-ui').style.display = 'block';
            document.getElementById('pdf-viewer').src = URL.createObjectURL(file);
        } else {
            document.getElementById('modal-ebook-ui').style.display = 'block';
            document.getElementById('epub-viewer').innerHTML = ''; 
            const book = ePub(file);
            rendition = book.renderTo("epub-viewer", { width: "100%", height: "100%" });
            rendition.display();
        }
    }

    // --- HIGHLIGHTING & INBOX ---
    document.addEventListener('selectionchange', () => {
        const text = window.getSelection().toString().trim();
        const btn = document.getElementById('floating-highlight');
        if (text.length > 0 && document.getElementById('media-modal').classList.contains('open')) {
            btn.style.display = 'block';
        } else {
            btn.style.display = 'none';
        }
    });

    function saveSelectedText(event) {
        event.preventDefault(); 
        const text = window.getSelection().toString().trim();
        if(text) {
            const source = document.getElementById('modal-title').innerText;
            const img = document.getElementById('media-modal').dataset.currentImg;
            saveNote(text, source, img);
            window.getSelection().removeAllRanges();
            document.getElementById('floating-highlight').style.display = 'none';
        }
    }

    function saveNote(text, source, img = "") {
        db.notes.push({ 
            id: Date.now(), text, source, img, thoughts: "", 
            date: new Date().toISOString(), reviewCount: 0, 
            interval: 1, ease: 2.5, nextReview: Date.now() 
        });
        save(); alert("Saved to Inbox!"); renderInbox();
    }

    function renderInbox() {
        const list = document.getElementById('inbox-list');
        list.innerHTML = db.notes.length ? db.notes.sort((a,b) => b.id - a.id).map(n => `
            <div class="glass-card" style="cursor:default;">
                ${n.img ? `<img src="${n.img}" class="inbox-img">` : ''}
                <span class="item-meta">${n.source}</span>
                <span class="item-title" style="font-size:16px;">${n.text}</span>
                <div class="user-note" onclick="editThought(${n.id})">
                    ${n.thoughts ? `<strong>📝 Notes:</strong><br>${n.thoughts}` : `<span style="color:var(--sub)">📝 Tap to add notes...</span>`}
                </div>
                <div style="font-size:12px; color:var(--sub); margin-top:10px;">
                    <span class="material-symbols-outlined" style="font-size:14px; vertical-align:middle;">psychology</span> Seen: ${n.reviewCount || 0} times
                </div>
            </div>
        `).join('') : '<p style="text-align:center; color:var(--sub); margin-top: 40px;">Inbox empty.</p>';
    }

    function editThought(id) {
        const note = db.notes.find(n => n.id === id);
        const newThoughts = prompt("Add or edit your thoughts:", note.thoughts || "");
        if (newThoughts !== null) { note.thoughts = newThoughts; save(); renderInbox(); }
    }

    function snipAudio() {
        const audio = document.getElementById('main-audio');
        const video = document.getElementById('main-video');
        let prefix = "";
        
        if (audio.style.display === 'block' && audio.src) {
            prefix = `[${Math.floor(audio.currentTime)}s] `;
        } else if (video.style.display === 'block') {
            prefix = `[YouTube Note] `;
        }
        
        const thought = prompt("Enter your note for this media:");
        if(thought) saveNote(`${prefix}${thought}`, document.getElementById('modal-title').innerText, document.getElementById('media-modal').dataset.currentImg);
    }

    // --- SRS ENGINE ---
    function startSRS() {
        const now = Date.now();
        srsQueue = db.notes.filter(n => n.nextReview <= now);
        
        if(srsQueue.length === 0) return alert("You are all caught up for today!");
        
        const modal = document.getElementById('srs-modal');
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('open'), 10);
        showNextSRS();
    }

    function showNextSRS() {
        const body = document.getElementById('srs-body');
        if(srsQueue.length === 0) {
            body.innerHTML = `<h3 style="text-align:center; margin-top:50px;">Review Complete! 🎉</h3>`;
            setTimeout(() => closeModal('srs-modal'), 1500);
            renderInbox(); 
            return;
        }

        const note = srsQueue[0];
        body.innerHTML = `
            <div class="glass-card">
                ${note.img ? `<img src="${note.img}" class="inbox-img" style="width:80px; height:80px;">` : ''}
                <span class="item-meta" style="color:var(--accent);">${note.source}</span>
                <span class="item-title" style="font-size:18px;">${note.text}</span>
                ${note.thoughts ? `<div class="user-note">${note.thoughts}</div>` : ''}
            </div>
            <p style="text-align:center; margin-top:20px; color:var(--sub);">How well did you remember this?</p>
            <div class="srs-btns">
                <button style="background:#FF3B30; cursor:pointer;" onclick="processSRS('hard')">Hard</button>
                <button style="background:#34C759; cursor:pointer;" onclick="processSRS('good')">Good</button>
                <button style="background:#007AFF; cursor:pointer;" onclick="processSRS('easy')">Easy</button>
            </div>
            <p style="text-align:center; margin-top:20px; color:var(--sub); font-size:13px;">${srsQueue.length} remaining</p>
        `;
    }

    function processSRS(grade) {
        let note = srsQueue.shift();
        let idx = db.notes.findIndex(n => n.id === note.id);
        
        if (grade === 'hard') { note.interval = 1; note.ease = Math.max(1.3, note.ease - 0.2); }
        else if (grade === 'good') { note.interval = Math.max(1, Math.round(note.interval * note.ease)); }
        else if (grade === 'easy') { note.ease += 0.15; note.interval = Math.max(1, Math.round(note.interval * note.ease * 1.3)); }
        
        note.nextReview = Date.now() + (note.interval * 24 * 60 * 60 * 1000);
        note.reviewCount = (note.reviewCount || 0) + 1;
        
        db.notes[idx] = note; save(); showNextSRS();
    }

    switchTab('inbox');
</script>
</body>
